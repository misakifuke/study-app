<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>勉強アプリ</title>

<style>
body {
  font-family: sans-serif;
  text-align: center;
  margin: 0;
}

video, canvas, img {
  width: 100%;
  max-width: 400px;
}

button {
  margin: 5px;
  padding: 10px;
  font-size: 16px;
}

#drawCanvas {
  border: 1px solid black;
  touch-action: none;
}
</style>
</head>

<body>

<h2>📚 勉強アプリ</h2>

<!-- モード -->
<div>
  <button onclick="setMode('question')">問題</button>
  <button onclick="setMode('answer')">答え</button>
</div>

<!-- カメラ -->
<video id="video" autoplay playsinline></video>
<br>
<button onclick="startCamera()">カメラ起動</button>
<button onclick="capture()">撮影</button>

<!-- 描画 -->
<canvas id="drawCanvas"></canvas>
<br>

<!-- 一時保存 -->
<button onclick="saveData()">追加</button>

<!-- 送信 -->
<button onclick="sendAll()">まとめて送信</button>

<!-- カウント -->
<div>
  問題数: <span id="qCount">0</span> |
  答え数: <span id="aCount">0</span>
</div>

<hr>

<!-- 復習 -->
<button onclick="startReview()">復習開始</button>

<div id="review"></div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycby8F6D6aj_5xq8nPH-sNjQB4BEtMydS2WWilCkFQ8ngicr4LA4plCpj4o7vQ4PXTIOW/exec";

let mode = "question";
let stream;
let canvas = document.getElementById("drawCanvas");
let ctx = canvas.getContext("2d");

let drawing = false;
let currentImage = "";
let tempData = [];

function setMode(m) {
  mode = m;
  alert("モード：" + (m === "question" ? "問題" : "答え"));
}

async function startCamera() {
  stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: "environment" }
  });
  document.getElementById("video").srcObject = stream;
}

function capture() {
  const video = document.getElementById("video");

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.drawImage(video, 0, 0);

  currentImage = canvas.toDataURL("image/png");
}

canvas.addEventListener("touchstart", e => {
  drawing = true;
  draw(e);
});

canvas.addEventListener("touchmove", draw);

canvas.addEventListener("touchend", () => drawing = false);

function draw(e) {
  if (!drawing) return;

  e.preventDefault();

  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;

  const x = (e.touches[0].clientX - rect.left) * scaleX;
  const y = (e.touches[0].clientY - rect.top) * scaleY;

  ctx.fillStyle = "red";
  ctx.beginPath();
  ctx.arc(x, y, 5, 0, Math.PI * 2);
  ctx.fill();
}

function saveData() {
  if (!currentImage) {
    alert("先に撮影して");
    return;
  }

  tempData.push({
    type: mode,
    image: currentImage
  });

  updateCount();

  alert("追加OK");
}

function updateCount() {
  let q = tempData.filter(d => d.type === "question").length;
  let a = tempData.filter(d => d.type === "answer").length;

  document.getElementById("qCount").innerText = q;
  document.getElementById("aCount").innerText = a;
}

async function sendAll() {
  let questions = tempData.filter(d => d.type === "question");
  let answers = tempData.filter(d => d.type === "answer");

  for (let i = 0; i < questions.length; i++) {
    await fetch(API_URL, {
      method: "POST",
      body: JSON.stringify({
        question: questions[i]?.image || "",
        answer: answers[i]?.image || "",
        image: questions[i]?.image || ""
      })
    });
  }

  alert("送信完了");

  tempData = [];
  updateCount();
}

function startReview() {
  fetch(API_URL)
    .then(res => res.json())
    .then(data => {

      if (data.length === 0) {
        document.getElementById("review").innerHTML = "問題なし";
        return;
      }

      let html = "";

      data.forEach((item, i) => {
        html += `
          <div style="margin:20px;">
            <h3>問題 ${i+1}</h3>
            <img src="${item.image}">
            <br>
            <button onclick="showAnswer('${item.answer}')">答え</button>
          </div>
        `;
      });

      document.getElementById("review").innerHTML = html;
    });
}

function showAnswer(ans) {
  if (!ans) {
    alert("答えなし");
  } else {
    const w = window.open();
    w.document.write("<img src='" + ans + "' style='width:100%'>");
  }
}
</script>

</body>
</html>
