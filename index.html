<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>問題登録</title>

<style>
body {
  text-align: center;
  font-family: sans-serif;
}

#container {
  position: relative;
  display: inline-block;
}

video, canvas {
  width: 100%;
  max-width: 400px;
  display: block;
}

canvas {
  position: absolute;
  top: 0;
  left: 0;
}

button {
  margin: 10px;
  padding: 10px 20px;
  font-size: 16px;
}

.controls {
  margin-top: 10px;
}
</style>
</head>

<body>

<h2>問題登録</h2>

<div id="container">
  <video id="video" autoplay playsinline></video>
  <canvas id="canvas"></canvas>
</div>

<div class="controls">
  <button onclick="startCamera()">撮影開始</button>
  <button onclick="capture()">撮影</button>
  <button onclick="save()">保存</button>
  <button onclick="send()">送信</button>
</div>

<div class="controls">
  <button onclick="setMode('question')">問題モード</button>
  <button onclick="setMode('answer')">解答モード</button>
</div>

<p>問題数: <span id="qCount">0</span></p>
<p>解答数: <span id="aCount">0</span></p>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbziof54Gsx2-44mVD5Rh3ubSaaSTvSSiV1AohWkMVhbgEJb5yHw41Z4qCCXZ1bTV2L7/exec";

let video = document.getElementById("video");
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");

let mode = "question";
let images = [];

let qCount = 0;
let aCount = 0;

async function startCamera() {
  const stream = await navigator.mediaDevices.getUserMedia({ video: true });
  video.srcObject = stream;
}

function capture() {
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  ctx.drawImage(video, 0, 0);

  let data = canvas.toDataURL("image/png");
  images.push(data);

  if (mode === "question") {
    qCount++;
    document.getElementById("qCount").textContent = qCount;
  } else {
    aCount++;
    document.getElementById("aCount").textContent = aCount;
  }
}

function save() {
  alert("保存済み！（まだローカル）");
}

async function send() {
  if (images.length === 0) {
    alert("画像がない！");
    return;
  }

  await fetch(GAS_URL, {
    method: "POST",
    body: JSON.stringify({ images })
  });

  alert("ドライブに送信完了！");
  images = [];
}

function setMode(m) {
  mode = m;
  alert("モード: " + m);
}

/* ===== 手書き機能 ===== */

let drawing = false;

canvas.addEventListener("mousedown", () => drawing = true);
canvas.addEventListener("mouseup", () => drawing = false);
canvas.addEventListener("mousemove", draw);

canvas.addEventListener("touchstart", () => drawing = true);
canvas.addEventListener("touchend", () => drawing = false);
canvas.addEventListener("touchmove", draw);

function draw(e) {
  if (!drawing) return;

  let rect = canvas.getBoundingClientRect();

  let x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
  let y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;

  ctx.lineWidth = 4;
  ctx.lineCap = "round";

  ctx.lineTo(x, y);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(x, y);

  e.preventDefault();
}
</script>

</body>
</html>
