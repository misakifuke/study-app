<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>神・問題アプリ</title>

<style>
body { text-align: center; font-family: sans-serif; }
video, canvas { width: 100%; max-width: 400px; }
canvas { border: 1px solid black; touch-action: none; }
button { margin: 5px; padding: 10px; }
</style>
</head>

<body>

<h1>問題登録</h1>

<video id="video" autoplay playsinline></video><br>

<button onclick="startCamera()">カメラ起動</button>
<button onclick="takePhoto()">撮影</button>
<button onclick="resetPhoto()">撮り直し</button>

<br><br>

<canvas id="canvas"></canvas>

<br>

<h2>撮影モード</h2>
<button onclick="captureMode='question'">問題</button>
<button onclick="captureMode='answer'">答え</button>

<br>

<button onclick="sendData()">送信</button>

<hr>

<h2>統計</h2>
<p id="count">問題: 0 / 答え: 0</p>

<hr>

<h2>復習</h2>
<button onclick="loadReview()">開始</button><br><br>

<img id="reviewImage" width="300"><br>

<button onclick="showAnswer()">答えを見る</button>
<button onclick="nextQuestion()">次へ</button>

<script>
let video = document.getElementById("video");
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");

let drawing = false;
let captureMode = "question";

let problemCount = 0;
let answerCount = 0;

let reviewData = [];
let currentIndex = 0;
let showingAnswer = false;

const GAS_URL = "https://script.google.com/macros/s/AKfycby8F6D6aj_5xq8nPH-sNjQB4BEtMydS2WWilCkFQ8ngicr4LA4plCpj4o7vQ4PXTIOW/exec";

// カメラ
async function startCamera() {
  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: "environment" }
  });
  video.srcObject = stream;
}

// 撮影
function takePhoto() {
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  ctx.drawImage(video, 0, 0);
}

// 描画（ズレ修正済み）
canvas.addEventListener("touchmove", e => {
  if (!drawing) return;

  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;

  const x = (e.touches[0].clientX - rect.left) * scaleX;
  const y = (e.touches[0].clientY - rect.top) * scaleY;

  ctx.fillRect(x, y, 3, 3);

  e.preventDefault();
});

canvas.addEventListener("touchstart", () => drawing = true);
canvas.addEventListener("touchend", () => drawing = false);

// リセット
function resetPhoto() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
}

// 送信（ここが進化ポイント🔥）
function sendData() {
  const image = canvas.toDataURL("image/png");

  fetch(GAS_URL, {
    method: "POST",
    body: JSON.stringify({
      image: image,
      type: captureMode
    })
  })
  .then(() => {
    alert("保存成功");

    if (captureMode === "question") problemCount++;
    else answerCount++;

    document.getElementById("count").innerText =
      "問題: " + problemCount + " / 答え: " + answerCount;

    resetPhoto();
  });
}

// ===== 復習 =====

// データ取得
function loadReview() {
  fetch(GAS_URL)
    .then(res => res.json())
    .then(data => {
      reviewData = data;
      currentIndex = 0;
      showQuestion();
    });
}

// 問題表示
function showQuestion() {
  showingAnswer = false;
  document.getElementById("reviewImage").src =
    reviewData[currentIndex].question;
}

// 答え表示
function showAnswer() {
  showingAnswer = true;
  document.getElementById("reviewImage").src =
    reviewData[currentIndex].answer;
}

// 次へ
function nextQuestion() {
  currentIndex++;
  if (currentIndex >= reviewData.length) {
    alert("終了！");
    return;
  }
  showQuestion();
}
</script>

</body>
</html>
