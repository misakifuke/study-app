<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{margin:0;font-family:sans-serif;text-align:center;background:#f5f5f5;}

button{
 width:90%;height:65px;margin:8px;
 border:none;border-radius:12px;
 color:white;font-size:16px;
}

.blue{background:#3498db;}
.green{background:#2ecc71;}
.orange{background:#f39c12;}
.red{background:#e74c3c;}
.purple{background:#9b59b6;}
.dark{background:#222;}

#back{
 position:fixed;top:10px;left:10px;
 width:55px;height:55px;background:#222;color:white;
}

video,img,canvas{
 width:92%;
 aspect-ratio:16/9;
 object-fit:cover;
 border-radius:12px;
 margin:10px auto;
 display:block;
 background:black;
}

.captureBtn{
 position:fixed;bottom:20px;left:50%;
 transform:translateX(-50%);
 width:70px;height:70px;
 border-radius:50%;
 background:white;border:4px solid #ccc;
}

.wrap{position:relative;}
.arrow{
 position:absolute;top:50%;
 transform:translateY(-50%);
 width:45px;height:45px;
 border-radius:50%;
 background:#222;color:white;
}
.left{left:10px;}
.right{right:10px;}

#loading{
 position:fixed;
 top:0;left:0;
 width:100%;height:100%;
 background:rgba(0,0,0,0.6);
 color:#fff;
 display:none;
 align-items:center;
 justify-content:center;
 font-size:20px;
 z-index:999;
}
</style>
</head>

<body>

<div id="loading">しばらくお待ちください...</div>
<button id="back" style="display:none">←</button>
<div id="app"></div>

<script>
const app=document.getElementById("app");
const back=document.getElementById("back");
const loading=document.getElementById("loading");

const URL="https://script.google.com/macros/s/AKfycbwoIEq2Bvxc8f1-glqP-0K_SBVdqiATr_Fti0z_Z7vGykZADJKsa3GLlPnbBPQeB-C0NA/exec";

let history=[];
let video,canvas,ctx;

let state={
 screen:"home",
 qImgs:[],aImgs:[],tempImgs:[],
 isAnswer:false,
 editIndex:0,
 reviewData:[],
 reviewIndex:0,
 reviewSub:0,
 mode:"q"
};

function showLoading(){loading.style.display="flex";}
function hideLoading(){loading.style.display="none";}

/* 戻る */
function save(){history.push(JSON.parse(JSON.stringify(state)));back.style.display="block";}
back.onclick=()=>goBack();
function goBack(){
 if(!history.length)return;
 state=history.pop();
 render();
 if(!history.length) back.style.display="none";
}

/* トリミング */
function crop169(w,h){
 let r=16/9,cur=w/h;
 if(cur>r){
  let nw=h*r;
  return {sx:(w-nw)/2,sy:0,sw:nw,sh:h};
 }else{
  let nh=w/r;
  return {sx:0,sy:(h-nh)/2,sw:w,sh:nh};
 }
}

/* 画面 */
function render(){
 if(state.screen==="home") home();
 if(state.screen==="cam") cam();
 if(state.screen==="edit") edit();
 if(state.screen==="review") review();
}

/* ホーム */
function home(){
 back.style.display="none";
 app.innerHTML=`
 <h2>ホーム</h2>
 <button class="blue" onclick="goCam()">問題登録</button>
 <button class="green" onclick="startReview('normal')">問題復習</button>
 <button class="orange" onclick="startReview('alpha')">問題復習α</button>
 <button class="red" onclick="startReview('plus')">問題復習＋</button>
 <button class="purple" onclick="startReview('all')">総復習</button>
 <button class="dark" onclick="startContinue()">続きから総復習</button>
 `;
}

/* カメラ */
function goCam(){save();state.screen="cam";render();}

async function cam(){
 app.innerHTML=`
 <video id="video" autoplay playsinline></video>
 <img id="prev" style="display:none">
 <button class="captureBtn" onclick="capture()"></button>
 <div id="btns"></div>
 <button class="green" onclick="goEdit()">編集</button>
 ${state.isAnswer?'<button class="red" onclick="send()">送信</button>':''}
 `;
 video=document.getElementById("video");
 let s=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}});
 video.srcObject=s;
}

/* 撮影 */
function capture(){
 let c=document.createElement("canvas");
 let ctx=c.getContext("2d");
 let w=video.videoWidth,h=video.videoHeight;
 let crop=crop169(w,h);
 c.width=1280;c.height=720;
 ctx.drawImage(video,crop.sx,crop.sy,crop.sw,crop.sh,0,0,1280,720);
 let data=c.toDataURL();

 video.style.display="none";
 let prev=document.getElementById("prev");
 prev.src=data; prev.style.display="block";

 document.getElementById("btns").innerHTML=`
 <button class="blue" onclick="add('${data}')">追加</button>
 <button class="orange" onclick="retake()">撮り直し</button>
 `;
}

function add(d){
 state.tempImgs.push(d);
 video.style.display="block";
 document.getElementById("prev").style.display="none";
 document.getElementById("btns").innerHTML="";
}

function retake(){
 video.style.display="block";
 document.getElementById("prev").style.display="none";
 document.getElementById("btns").innerHTML="";
}

/* 編集 */
function goEdit(){
 if(!state.tempImgs.length)return alert("画像なし");
 save();
 state.screen="edit";
 state.editIndex=0;
 render();
}

let drawing=false;

function edit(){
 app.innerHTML=`
 <div class="wrap">
 <button class="arrow left" onclick="prevImg()">←</button>
 <canvas id="canvas"></canvas>
 <button class="arrow right" onclick="nextImg()">→</button>
 </div>
 <button class="green" onclick="finishEdit()">完了</button>
 `;
 canvas=document.getElementById("canvas");
 ctx=canvas.getContext("2d");

 canvas.addEventListener("touchstart",e=>{drawing=true;draw(e)},{passive:false});
 canvas.addEventListener("touchmove",e=>{if(drawing)draw(e)},{passive:false});
 canvas.addEventListener("touchend",()=>drawing=false);

 show();
}

function show(){
 let img=new Image();
 img.src=state.tempImgs[state.editIndex];
 img.onload=()=>{
  canvas.width=img.width;
  canvas.height=img.height;
  ctx.drawImage(img,0,0);
 };
}

function draw(e){
 e.preventDefault();
 let r=canvas.getBoundingClientRect();
 let x=(e.touches[0].clientX-r.left)*(canvas.width/r.width);
 let y=(e.touches[0].clientY-r.top)*(canvas.height/r.height);
 ctx.fillStyle="red";
 ctx.fillRect(x,y,5,5);
}

function nextImg(){saveEdit();if(state.editIndex<state.tempImgs.length-1)state.editIndex++;show();}
function prevImg(){saveEdit();if(state.editIndex>0)state.editIndex--;show();}
function saveEdit(){state.tempImgs[state.editIndex]=canvas.toDataURL();}

function finishEdit(){
 saveEdit();
 state.qImgs=state.qImgs.concat(state.tempImgs);
 state.tempImgs=[];
 state.isAnswer=true;
 state.screen="cam";
 render();
}

/* 送信 */
async function send(){
 try{
  showLoading();
  await fetch(URL,{
   method:"POST",
   body:JSON.stringify({questions:state.qImgs,answers:state.aImgs})
  });
 }catch(e){
  alert("送信失敗");
 }
 hideLoading();

 state={screen:"home",qImgs:[],aImgs:[],tempImgs:[],isAnswer:false};
 history=[];
 render();
}

/* 復習 */
async function startReview(mode){
 try{
  showLoading();
  let res=await fetch(URL);
  let data=await res.json();

  let now=new Date();
  let get=n=>{let d=new Date();d.setDate(now.getDate()-n);return d;}

  function same(d1,d2){
   return d1.getFullYear()===d2.getFullYear() &&
          d1.getMonth()===d2.getMonth() &&
          d1.getDate()===d2.getDate();
  }

  if(mode==="normal"){
   state.reviewData=data.filter(x=>same(new Date(x.date),get(1)));
  }
  else if(mode==="alpha"){
   state.reviewData=data.filter(x=>[3,7,14].some(n=>same(new Date(x.date),get(n))));
  }
  else if(mode==="plus"){
   state.reviewData=data.filter(x=>[1,3,7,14].some(n=>same(new Date(x.date),get(n))));
  }
  else{
   state.reviewData=data;
  }

  state.reviewIndex=0;
  state.reviewSub=0;
  state.screen="review";
 }catch(e){
  alert("読み込み失敗");
 }
 hideLoading();
 render();
}

function startContinue(){
 state.reviewIndex=+localStorage.i||0;
 state.reviewSub=+localStorage.j||0;
 startReview("all");
}

function review(){
 let d=state.reviewData[state.reviewIndex];
 if(!d)return app.innerHTML="データなし";

 let list=state.mode==="q"?d.questions:d.answers;

 app.innerHTML=`
 <div class="wrap">
 <button class="arrow left" onclick="prevR()">←</button>
 <img src="${list[state.reviewSub]}">
 <button class="arrow right" onclick="nextR()">→</button>
 </div>
 <button class="green" onclick="toggle()">切替</button>
 <button class="dark" onclick="saveProg()">保存</button>
 `;
}

function nextR(){
 let d=state.reviewData[state.reviewIndex];
 let list=state.mode==="q"?d.questions:d.answers;

 if(state.reviewSub<list.length-1){
  state.reviewSub++;
 }else if(state.reviewIndex<state.reviewData.length-1){
  state.reviewIndex++;
  state.reviewSub=0;
 }
 render();
}

function prevR(){
 if(state.reviewSub>0){
  state.reviewSub--;
 }else if(state.reviewIndex>0){
  state.reviewIndex--;
  let d=state.reviewData[state.reviewIndex];
  let list=state.mode==="q"?d.questions:d.answers;
  state.reviewSub=list.length-1;
 }
 render();
}

function toggle(){state.mode=state.mode==="q"?"a":"q";state.reviewSub=0;render();}
function saveProg(){localStorage.i=state.reviewIndex;localStorage.j=state.reviewSub;}

render();
</script>
</body>
</html>
