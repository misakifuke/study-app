<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>問題登録</title>

<style>
body { text-align: center; font-family: sans-serif; }
#container { position: relative; display: inline-block; width: 100%; max-width: 400px; }
video, canvas { width: 100%; display: block; }
canvas { position: absolute; top: 0; left: 0; }
button { margin: 6px; padding: 10px; }
</style>
</head>

<body>

<h2>問題登録</h2>

<div id="container">
<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>
</div>

<br>

<button onclick="startCamera()">カメラ</button>
<button onclick="capture()">撮影</button>
<button onclick="next()">次へ</button>
<button onclick="send()">送信</button>

<br>

<button onclick="setMode('question')">問題</button>
<button onclick="setMode('answer')">解答</button>

<p>問題数: <span id="qCount">1</span></p>
<p>答え数: <span id="aCount">0</span></p>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbziof54Gsx2-44mVD5Rh3ubSaaSTvSSiV1AohWkMVhbgEJb5yHw41Z4qCCXZ1bTV2L7/exec";

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let mode = "question";

// データ構造（重要）
let data = [
  { question: [], answers: [] }
];

let current = 0;

async function startCamera() {
  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: "environment" }
  });
  video.srcObject = stream;
}

function resize() {
  const rect = video.getBoundingClientRect();
  canvas.width = rect.width;
  canvas.height = rect.height;
}

function capture() {
  resize();
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
  ctx.beginPath();

  const img = canvas.toDataURL("image/png");

  if (mode === "question") {
    data[current].question.push(img);
  } else {
    data[current].answers.push(img);
    updateAnswerCount();
  }
}

function next() {
  data.push({ question: [], answers: [] });
  current++;
  updateQuestionCount();
  updateAnswerCount();
}

function setMode(m) {
  mode = m;
  alert("モード: " + m);
}

function updateQuestionCount() {
  document.getElementById("qCount").textContent = data.length;
}

function updateAnswerCount() {
  document.getElementById("aCount").textContent = data[current].answers.length;
}

async function send() {
  let images = [];

  data.forEach(set => {
    images = images.concat(set.question, set.answers);
  });

  await fetch(GAS_URL, {
    method: "POST",
    body: JSON.stringify({ images })
  });

  alert("送信完了");
}
</script>

</body>
</html>
