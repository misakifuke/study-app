<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
 margin:0;
 font-family:sans-serif;
 text-align:center;
 background:#f5f5f5;
}

button{
 width:85%;
 height:65px;
 margin:10px;
 border:none;
 border-radius:12px;
 color:white;
 font-size:18px;
}

.blue{background:#3498db;}
.green{background:#2ecc71;}
.orange{background:#f39c12;}
.purple{background:#9b59b6;}

video{
 width:90%;
 height:60vh;
 object-fit:cover;
 border-radius:10px;
}

canvas{
 width:90%;
 max-height:60vh;
 border:1px solid black;
 border-radius:10px;
}

.captureBtn{
 position:fixed;
 bottom:20px;
 left:20px;
 width:70px;
 height:70px;
 border-radius:50%;
 background:white;
 border:5px solid #ccc;
}

#flash{
 position:fixed;
 top:50%;
 left:50%;
 transform:translate(-50%,-50%);
 background:rgba(0,0,0,0.6);
 color:white;
 padding:20px;
 border-radius:10px;
 display:none;
}
</style>
</head>

<body>

<div id="flash"></div>
<div id="app"></div>

<script>
const URL="https://script.google.com/macros/s/AKfycbwoIEq2Bvxc8f1-glqP-0K_SBVdqiATr_Fti0z_Z7vGykZADJKsa3GLlPnbBPQeB-C0NA/exec";

let qImgs=[],aImgs=[],tempImgs=[];
let isAnswer=false;

let video,canvas,ctx;

/* フラッシュ */
function flash(text){
 let f=document.getElementById("flash");
 f.innerText=text;
 f.style.display="block";
 setTimeout(()=>f.style.display="none",500);
}

/* ===== 登録画面 ===== */
function goRegister(){

 document.getElementById("app").innerHTML=`
  <h2>${isAnswer?"答え撮影":"問題撮影"}</h2>

  <video id="video" autoplay playsinline></video>
  <button class="captureBtn" onclick="capture()"></button>

  <canvas id="canvas"></canvas>

  <button class="blue" onclick="add()">追加</button>
  <button class="green" onclick="startEdit()">編集</button>

  <div id="count">問題:${qImgs.length + (isAnswer?0:tempImgs.length)} 答え:${aImgs.length + (isAnswer?tempImgs.length:0)}</div>
 `;

 video=document.getElementById("video");
 canvas=document.getElementById("canvas");
 ctx=canvas.getContext("2d");

 startCamera();
}

/* カメラ */
async function startCamera(){
 const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}});
 video.srcObject=s;
}

function capture(){
 canvas.width=video.videoWidth;
 canvas.height=video.videoHeight;
 ctx.drawImage(video,0,0);
}

/* 🔥 ここ重要：追加 */
function add(){
 const img=canvas.toDataURL();
 tempImgs.push(img);

 updateCount(); // ←画面だけ更新
 flash("追加完了");
}

/* 🔥 カウント更新 */
function updateCount(){
 document.getElementById("count").innerText=
  `問題:${qImgs.length + (isAnswer?0:tempImgs.length)} 答え:${aImgs.length + (isAnswer?tempImgs.length:0)}`;
}

/* ===== 編集 ===== */
let editIndex=0;
let drawing=false;

function startEdit(){
 if(tempImgs.length===0)return alert("画像なし");

 editIndex=0;

 document.getElementById("app").innerHTML=`
  <h2>編集</h2>

  <button onclick="prev()">←</button>
  <img id="img">
  <button onclick="next()">→</button>

  <canvas id="canvas"></canvas>

  <button class="green" onclick="finishEdit()">完了</button>
 `;

 canvas=document.getElementById("canvas");
 ctx=canvas.getContext("2d");

 canvas.addEventListener("touchstart",e=>{drawing=true;draw(e);});
 canvas.addEventListener("touchmove",draw);
 canvas.addEventListener("touchend",()=>drawing=false);

 show();
}

function show(){
 let img=new Image();
 img.src=tempImgs[editIndex];
 img.onload=()=>{
  canvas.width=img.width;
  canvas.height=img.height;
  ctx.drawImage(img,0,0);
 };
}

function next(){save();if(editIndex<tempImgs.length-1)editIndex++;show();}
function prev(){save();if(editIndex>0)editIndex--;show();}
function save(){tempImgs[editIndex]=canvas.toDataURL();}

function finishEdit(){
 save();

 if(!isAnswer){
  qImgs=qImgs.concat(tempImgs);
  tempImgs=[];
  isAnswer=true;
 }else{
  aImgs=aImgs.concat(tempImgs);
  tempImgs=[];
  send();
  return;
 }

 goRegister();
}

/* 送信 */
async function send(){
 await fetch(URL,{
  method:"POST",
  body:JSON.stringify({
   questions:qImgs,
   answers:aImgs
  })
 });

 qImgs=[];aImgs=[];
 isAnswer=false;

 alert("保存完了");
 goRegister();
}

/* 初期 */
goRegister();
</script>

</body>
</html>
