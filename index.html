<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>

body{
 margin:0;
 font-family:sans-serif;
 text-align:center;
 background:#f5f5f5;
 overflow:hidden;
}

#app{
 padding-top:80px;
 height:100vh;
 overflow:auto;
}

button{
 width:90%;
 height:60px;
 margin:6px;
 border:none;
 border-radius:12px;
 color:#fff;
 font-size:15px;
}

.blue{background:#3498db;}
.green{background:#2ecc71;}
.orange{background:#f39c12;}
.red{background:#e74c3c;}
.purple{background:#9b59b6;}
.dark{background:#222;}

#back{
 position:fixed;
 top:10px;
 left:10px;
 width:55px;
 height:55px;
 background:#222;
 color:#fff;
 z-index:1000;
}

/* 表示 */
video, img, canvas{
 width:100%;
 height:auto;
 max-height:100vh;
 object-fit:contain;
 border-radius:12px;
 margin:0;
 display:block;
 background:#000;
}

/* カメラ */
.full{
 position:fixed;
 top:0;
 left:0;
 width:100%;
 height:100%;
 object-fit:cover;
 z-index:1;
}

/* プレビュー（静止画） */
#prev{
 position:fixed;
 top:0;
 left:0;
 width:100%;
 height:100%;
 object-fit:contain;
 z-index:5;
}

/* シャッター */
.captureBtn{
 position:fixed;
 bottom:20px;
 left:50%;
 transform:translateX(-50%);
 width:80px;
 height:80px;
 border-radius:50%;
 background:rgba(255,255,255,0.5);
 border:5px solid rgba(255,255,255,0.8);
 z-index:2000;
}

/* ボタン */
#btns{
 position:fixed;
 bottom:110px;
 left:50%;
 transform:translateX(-50%);
 width:90%;
 z-index:3000;
}

/* 編集ボタン（右上） */
#editFloat{
 position:fixed;
 top:15px;
 right:15px;
 background:rgba(0,0,0,0.4);
 color:#fff;
 padding:10px 14px;
 border-radius:20px;
 z-index:3000;
}

/* 編集 */
.wrap{
 position:relative;
 width:100%;
 height:100vh;
 overflow:auto;
}

.arrow{
 position:absolute;
 top:50%;
 transform:translateY(-50%);
 width:50px;
 height:50px;
 border-radius:50%;
 background:#222;
 color:#fff;
 opacity:0.9;
}

.left{left:10px;}
.right{right:10px;}

/* ローディング */
#loading{
 position:fixed;
 top:0;
 left:0;
 width:100%;
 height:100%;
 background:rgba(0,0,0,0.6);
 color:#fff;
 display:none;
 align-items:center;
 justify-content:center;
 font-size:20px;
 z-index:999;
}

/* 全削除 */
#resetBtn{
 position:fixed;
 right:20px;
 bottom:20px;
 width:70px;
 height:70px;
 border-radius:50%;
 background:rgba(0,0,0,0.5);
 color:#fff;
 border:none;
 z-index:4000;
}

</style>
</head>

<body>

<div id="loading">しばらくお待ちください...</div>
<button id="back">←</button>
<div id="app"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBcDoxg5Lv-Pch6ll3kp3KHOyqgRAvajau",
  authDomain: "studyapp-fd328.firebaseapp.com",
  projectId: "studyapp-fd328",
  storageBucket: "studyapp-fd328.firebasestorage.app",
  messagingSenderId: "143218536074",
  appId: "1:143218536074:web:42de43c56334ea3c920773"
};

const appFirebase = initializeApp(firebaseConfig);
const db = getFirestore(appFirebase);

const app=document.getElementById("app");
const back=document.getElementById("back");
const loading=document.getElementById("loading");

let history=[];
let video,canvas,ctx;
let startX=0,endX=0;
let lastShot="";

let state={
 screen:"home",
 reviewMode:"",
 qImgs:[],
 aImgs:[],
 tempImgs:[],
 isAnswer:false,
 editIndex:0,
 reviewData:[],
 reviewIndex:0,
 reviewSub:0,
 mode:"q"
};

function showLoading(){loading.style.display="flex";}
function hideLoading(){loading.style.display="none";}
function save(){history.push(JSON.stringify(state));}

back.onclick=()=>{
 if(history.length){
  state=JSON.parse(history.pop());
  render();
 }
};

function enhanceText(ctx,w,h){
 let img=ctx.getImageData(0,0,w,h);
 let d=img.data;
 for(let i=0;i<d.length;i+=4){
  let avg=(d[i]+d[i+1]+d[i+2])/3;
  if(avg>150){d[i]=d[i+1]=d[i+2]=255;}
  else{d[i]=d[i+1]=d[i+2]=0;}
 }
 ctx.putImageData(img,0,0);
}

function render(){
 back.style.display=(state.screen==="home")?"none":"block";
 if(state.screen==="home") home();
 if(state.screen==="cam") cam();
 if(state.screen==="edit") edit();
 if(state.screen==="review") review();
}

/* ホーム */
function home(){
 app.innerHTML=`
 <h2>ホーム</h2>
 <button class="blue" onclick="goCam()">問題登録</button>
 <button class="green" onclick="startReview('normal')">通常（1日前）</button>
 <button class="orange" onclick="startReview('alpha')">α（3・5・14日前）</button>
 <button class="red" onclick="startReview('plus')">＋（1・3・5・14日前）</button>
 <button class="purple" onclick="startReview('all')">総復習</button>
 <button class="dark" onclick="startContinue()">続きから総復習</button>
 <button id="resetBtn" onclick="resetAll()">削除</button>
 `;
}

/* カメラ */
function goCam(){save();state.screen="cam";render();}

async function cam(){
 app.innerHTML=`
 <video id="video" class="full" autoplay playsinline></video>
 <img id="prev" style="display:none">
 <button class="captureBtn" onclick="capture()"></button>
 <div id="btns"></div>
 ${!state.isAnswer ? '<div id="editFloat" onclick="goEdit()">編集</div>' : ''}
 ${state.isAnswer ? '<button class="red" onclick="send()">送信</button>' : ''}
 `;

 video=document.getElementById("video");

 let s=await navigator.mediaDevices.getUserMedia({
  video:{facingMode:"environment"}
 });

 video.srcObject=s;
}

/* 撮影 */
function capture(){
 let c=document.createElement("canvas");
 let cx=c.getContext("2d");

 let w=video.videoWidth;
 let h=video.videoHeight;

 c.width=w;
 c.height=h;

 cx.drawImage(video,0,0,w,h);
 enhanceText(cx,w,h);

 lastShot=c.toDataURL("image/jpeg",0.9);

 let prev=document.getElementById("prev");
 prev.src=lastShot;
 prev.style.display="block";

 video.style.display="none";

 document.getElementById("btns").innerHTML=`
 <button class="blue" onclick="add()">追加</button>
 <button class="orange" onclick="retake()">撮り直し</button>
 `;
}

/* 追加 */
function add(){
 if(!lastShot)return;

 if(state.isAnswer){state.aImgs.push(lastShot);}
 else{state.tempImgs.push(lastShot);}

 lastShot="";

 document.getElementById("prev").style.display="none";
 video.style.display="block";
 document.getElementById("btns").innerHTML="";
}

/* 撮り直し */
function retake(){
 lastShot="";
 document.getElementById("prev").style.display="none";
 video.style.display="block";
 document.getElementById("btns").innerHTML="";
}

/* 編集（元のまま） */
function goEdit(){
 if(!state.tempImgs.length)return alert("画像なし");
 save();
 state.screen="edit";
 state.editIndex=0;
 render();
}

let drawing=false;

function edit(){
 app.innerHTML=`
 <div class="wrap">
  <button class="arrow left" onclick="prevImg()">←</button>
  <canvas id="canvas"></canvas>
  <button class="arrow right" onclick="nextImg()">→</button>
 </div>
 <button class="green" onclick="finishEdit()">完了</button>
 `;
 canvas=document.getElementById("canvas");
 ctx=canvas.getContext("2d");

 canvas.addEventListener("touchstart",e=>{drawing=true;draw(e)},{passive:false});
 canvas.addEventListener("touchmove",e=>{if(drawing)draw(e)},{passive:false});
 canvas.addEventListener("touchend",()=>drawing=false);

 show();
}

function show(){
 let img=new Image();
 img.src=state.tempImgs[state.editIndex];
 img.onload=()=>{
  canvas.width=img.width;
  canvas.height=img.height;

  let scale=window.innerWidth/img.width;
  canvas.style.width=window.innerWidth+"px";
  canvas.style.height=(img.height*scale)+"px";

  ctx.drawImage(img,0,0);
 };
}

function draw(e){
 e.preventDefault();
 let r=canvas.getBoundingClientRect();
 let x=(e.touches[0].clientX-r.left)*(canvas.width/r.width);
 let y=(e.touches[0].clientY-r.top)*(canvas.height/r.height);
 ctx.fillStyle="red";
 ctx.fillRect(x,y,5,5);
}

function nextImg(){saveEdit();if(state.editIndex<state.tempImgs.length-1)state.editIndex++;show();}
function prevImg(){saveEdit();if(state.editIndex>0)state.editIndex--;show();}
function saveEdit(){state.tempImgs[state.editIndex]=canvas.toDataURL();}

function finishEdit(){
 saveEdit();
 state.qImgs=state.qImgs.concat(state.tempImgs);
 state.tempImgs=[];
 state.isAnswer=true;
 state.screen="cam";
 render();
}

/* 送信 */
async function send(){
 try{
  showLoading();
  await addDoc(collection(db,"questions"),{
    questions:state.qImgs,
    answers:state.aImgs,
    date:new Date().toISOString()
  });
 }catch(e){
  alert("保存失敗");
 }
 hideLoading();
 state={screen:"home",reviewMode:"",qImgs:[],aImgs:[],tempImgs:[],isAnswer:false};
 history=[];
 render();
}

/* 全削除 */
async function resetAll(){
 let ok=confirm("本当に全て削除しますか？");
 if(!ok)return;

 try{
  showLoading();
  let snap=await getDocs(collection(db,"questions"));
  let promises=[];
  snap.forEach(d=>{
    promises.push(deleteDoc(doc(db,"questions",d.id)));
  });
  await Promise.all(promises);
 }catch(e){
  alert("削除失敗");
 }

 hideLoading();
 alert("削除完了");
 render();
}

/* 保存 */
function saveProg(){
 localStorage.setItem("save",JSON.stringify({
  reviewIndex:state.reviewIndex,
  reviewSub:state.reviewSub,
  reviewMode:state.reviewMode,
  mode:state.mode
 }));
 alert("保存した");
}

function loadProg(){
 let d=JSON.parse(localStorage.getItem("save")||"{}");
 state.reviewIndex=d.reviewIndex||0;
 state.reviewSub=d.reviewSub||0;
 state.reviewMode=d.reviewMode||"all";
 state.mode=d.mode||"q";
}

function startContinue(){
 loadProg();
 startReview(state.reviewMode,true);
}

/* 取得 */
async function fetchData(){
 let snap=await getDocs(collection(db,"questions"));
 let data=[];
 snap.forEach(doc=>data.push(doc.data()));
 return data;
}

/* 復習 */
async function startReview(mode,isContinue=false){
 save();
 state.reviewMode=mode;
 showLoading();

 let data=await fetchData();

 let now=new Date();
 let get=n=>{let d=new Date();d.setDate(now.getDate()-n);return d.toDateString();}
 let same=(a,b)=>a===b;

 state.reviewData=data.filter(x=>{
  let d=new Date(x.date).toDateString();
  if(mode==="normal") return same(d,get(1));
  if(mode==="alpha") return [3,5,14].some(n=>same(d,get(n)));
  if(mode==="plus") return [1,3,5,14].some(n=>same(d,get(n)));
  return true;
 });

 if(!isContinue){
  state.reviewIndex=0;
  state.reviewSub=0;
  state.mode="q";
 }

 state.screen="review";
 hideLoading();
 render();
}

/* レビュー */
function review(){
 let d=state.reviewData[state.reviewIndex];
 if(!d)return app.innerHTML="データなし";

 let list=(state.mode==="q")?d.questions:d.answers;
 if(!list||!list.length)return app.innerHTML="データなし";

 let saveBtn=(state.reviewMode==="all")
  ? `<button class="dark" onclick="saveProg()">保存</button>`
  : "";

 app.innerHTML=`
 <div style="margin-top:10px;font-size:14px;">
 セット ${state.reviewIndex+1}/${state.reviewData.length}（${state.reviewSub+1}/${list.length}）
 </div>

 <div class="wrap" id="swipeArea">
  <img id="slideImg" src="${list[state.reviewSub]}">
 </div>

 <button class="green" onclick="toggle()">切替</button>
 ${saveBtn}
 `;

 let area=document.getElementById("swipeArea");
 area.addEventListener("touchstart",e=>{startX=e.touches[0].clientX;});
 area.addEventListener("touchend",e=>{endX=e.changedTouches[0].clientX;handleSwipe();});
}

function handleSwipe(){
 let diff=endX-startX;
 if(Math.abs(diff)<50)return;
 if(diff<0){setTimeout(nextR,200);}
 else{setTimeout(prevR,200);}
}

function nextR(){
 let list=getList();
 if(state.reviewSub<list.length-1){
  state.reviewSub++;
 }else if(state.reviewIndex<state.reviewData.length-1){
  state.reviewIndex++;
  state.reviewSub=0;
 }
 render();
}

function prevR(){
 if(state.reviewSub>0){
  state.reviewSub--;
 }else if(state.reviewIndex>0){
  state.reviewIndex--;
  let list=getList();
  state.reviewSub=list.length-1;
 }
 render();
}

function getList(){
 let d=state.reviewData[state.reviewIndex];
 return state.mode==="q"?d.questions:d.answers;
}

function toggle(){
 state.mode=(state.mode==="q")?"a":"q";
 state.reviewSub=0;
 render();
}

/* ボタン */
window.goCam=goCam;
window.startReview=startReview;
window.startContinue=startContinue;
window.capture=capture;
window.add=add;
window.retake=retake;
window.goEdit=goEdit;
window.finishEdit=finishEdit;
window.prevImg=prevImg;
window.nextImg=nextImg;
window.send=send;
window.toggle=toggle;
window.saveProg=saveProg;
window.resetAll=resetAll;

render();

</script>
</body>
</html>
