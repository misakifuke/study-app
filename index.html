<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>完全版アプリ</title>

<style>
body { text-align:center; font-family:sans-serif; }
video, canvas { width:100%; max-width:400px; }
canvas { border:1px solid black; touch-action:none; }
button { margin:5px; padding:10px; }
</style>
</head>

<body>

<h1>問題登録</h1>

<video id="video" autoplay playsinline></video><br>
<button onclick="startCamera()">カメラ</button>
<button onclick="takePhoto()">撮影</button>
<button onclick="addPage()">追加</button>
<button onclick="resetAll()">リセット</button>

<canvas id="canvas"></canvas>

<h2>モード</h2>
<button onclick="mode='question'">問題</button>
<button onclick="mode='answer'">答え</button>

<button onclick="sendData()">送信</button>

<hr>

<h2>復習</h2>
<button onclick="loadReview()">開始</button><br><br>

<img id="reviewImage" width="300"><br>
<button onclick="nextImage()">次のページ</button>
<button onclick="nextSet()">次の問題</button>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycby8F6D6aj_5xq8nPH-sNjQB4BEtMydS2WWilCkFQ8ngicr4LA4plCpj4o7vQ4PXTIOW/exec";

let video = document.getElementById("video");
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");

let drawing=false;
let mode="question";

let images=[];

// カメラ
async function startCamera(){
 const stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}});
 video.srcObject = stream;
}

// 撮影
function takePhoto(){
 canvas.width = video.videoWidth;
 canvas.height = video.videoHeight;
 ctx.drawImage(video,0,0);
}

// ページ追加
function addPage(){
 const img = canvas.toDataURL("image/png");
 images.push(img);
 alert("追加："+images.length+"枚");
 ctx.clearRect(0,0,canvas.width,canvas.height);
}

// リセット
function resetAll(){
 images=[];
 ctx.clearRect(0,0,canvas.width,canvas.height);
}

// 描画（ズレ修正）
canvas.addEventListener("touchmove",e=>{
 if(!drawing)return;
 const rect=canvas.getBoundingClientRect();
 const scaleX=canvas.width/rect.width;
 const scaleY=canvas.height/rect.height;
 const x=(e.touches[0].clientX-rect.left)*scaleX;
 const y=(e.touches[0].clientY-rect.top)*scaleY;
 ctx.fillRect(x,y,3,3);
 e.preventDefault();
});
canvas.addEventListener("touchstart",()=>drawing=true);
canvas.addEventListener("touchend",()=>drawing=false);

// 送信
function sendData(){
 fetch(GAS_URL,{
  method:"POST",
  body:JSON.stringify({
   images:images,
   type:mode
  })
 }).then(()=>{
  alert("保存完了");
  resetAll();
 });
}

// ===== 復習 =====
let reviewData=[];
let setIndex=0;
let pageIndex=0;
let showingAnswer=false;

function loadReview(){
 fetch(GAS_URL)
 .then(r=>r.json())
 .then(data=>{
  reviewData=data;
  setIndex=0;
  pageIndex=0;
  showingAnswer=false;
  showImage();
 });
}

function showImage(){
 if(reviewData.length===0)return;
 const set=reviewData[setIndex];
 const imgs=showingAnswer?set.answer:set.question;
 document.getElementById("reviewImage").src=imgs[pageIndex];
}

function nextImage(){
 const set=reviewData[setIndex];
 const imgs=showingAnswer?set.answer:set.question;
 pageIndex++;
 if(pageIndex>=imgs.length){
  pageIndex=0;
  showingAnswer=!showingAnswer;
 }
 showImage();
}

function nextSet(){
 setIndex++;
 pageIndex=0;
 showingAnswer=false;
 if(setIndex>=reviewData.length){
  alert("終了！");
  return;
 }
 showImage();
}
</script>

</body>
</html>
