<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>完全体</title>

<style>
body{
 margin:0;
 font-family:sans-serif;
 text-align:center;
 background:#f5f5f5;
}

/* ボタン */
button{
 width:85%;
 height:65px;
 margin:10px;
 border:none;
 border-radius:12px;
 color:white;
 font-size:18px;
}

.blue{background:#3498db;}
.green{background:#2ecc71;}
.orange{background:#f39c12;}
.purple{background:#9b59b6;}
.black{background:#333;}

#back{
 position:fixed;
 top:10px;
 left:10px;
 width:50px;
 height:50px;
 background:#444;
}

/* カメラ */
video{
 width:100%;
 max-height:40vh;
 object-fit:cover;
}

/* キャンバス */
canvas{
 width:100%;
 border:1px solid black;
 touch-action:none;
}

/* 編集 */
.editor{
 display:flex;
 align-items:center;
 justify-content:center;
}

.arrow{
 width:50px;height:50px;
 background:#333;color:white;
 border-radius:50%;
}

img{
 max-width:70%;
 margin:0 10px;
}
</style>
</head>

<body>

<button id="back" onclick="goHome()" style="display:none">←</button>
<div id="app"></div>

<script>
const URL="https://script.google.com/macros/s/AKfycbwoIEq2Bvxc8f1-glqP-0K_SBVdqiATr_Fti0z_Z7vGykZADJKsa3GLlPnbBPQeB-C0NA/exec";

let state="home";

/* ===== 共通 ===== */
function setView(html){
 document.getElementById("app").innerHTML=html;
 document.getElementById("back").style.display=(state==="home")?"none":"block";
}

/* ===== ホーム ===== */
function goHome(){
 state="home";
 setView(`
  <h2>ホーム</h2>
  <button class="blue" onclick="goRegister()">問題登録</button>
 `);
}

/* ===== 登録 ===== */
let video,canvas,ctx;
let qImgs=[],aImgs=[];
let tempImgs=[];
let isAnswer=false;
let editIndex=0;
let drawing=false;

function goRegister(){
 state="register";

 setView(`
  <h2>${isAnswer?"答え撮影":"問題撮影"}</h2>

  <video id="video" autoplay playsinline></video>
  <button class="purple" onclick="startCamera()">カメラ</button>
  <button class="orange" onclick="capture()">撮影</button>

  <canvas id="canvas"></canvas>

  <button class="blue" onclick="add()">追加</button>
  <button class="green" onclick="startEdit()">編集</button>

  <div>問題:${qImgs.length} 答え:${aImgs.length}</div>
 `);

 video=document.getElementById("video");
 canvas=document.getElementById("canvas");
 ctx=canvas.getContext("2d");

 canvas.addEventListener("touchstart",e=>{drawing=true;draw(e);});
 canvas.addEventListener("touchmove",draw);
 canvas.addEventListener("touchend",()=>drawing=false);
}

async function startCamera(){
 const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}});
 video.srcObject=s;
}

function capture(){
 canvas.width=video.videoWidth;
 canvas.height=video.videoHeight;
 ctx.drawImage(video,0,0);
}

function draw(e){
 if(!drawing)return;
 e.preventDefault();
 const rect=canvas.getBoundingClientRect();
 const scaleX=canvas.width/rect.width;
 const scaleY=canvas.height/rect.height;
 const x=(e.touches[0].clientX-rect.left)*scaleX;
 const y=(e.touches[0].clientY-rect.top)*scaleY;
 ctx.fillRect(x,y,4,4);
}

function add(){
 const img=canvas.toDataURL();
 tempImgs.push(img);
}

/* ===== 編集 ===== */
function startEdit(){
 if(tempImgs.length===0)return alert("画像なし");

 state="edit";
 editIndex=0;

 setView(`
  <h2>編集</h2>

  <div class="editor">
    <button class="arrow" onclick="prev()">←</button>
    <img id="editImg">
    <button class="arrow" onclick="next()">→</button>
  </div>

  <canvas id="canvas"></canvas>

  <button class="green" onclick="finishEdit()">編集完了</button>
 `);

 canvas=document.getElementById("canvas");
 ctx=canvas.getContext("2d");

 canvas.addEventListener("touchstart",e=>{drawing=true;draw(e);});
 canvas.addEventListener("touchmove",draw);
 canvas.addEventListener("touchend",()=>drawing=false);

 showEdit();
}

function showEdit(){
 let img=new Image();
 img.src=tempImgs[editIndex];
 img.onload=()=>{
  canvas.width=img.width;
  canvas.height=img.height;
  ctx.drawImage(img,0,0);
 };
}

function next(){
 saveEdit();
 if(editIndex<tempImgs.length-1)editIndex++;
 showEdit();
}

function prev(){
 saveEdit();
 if(editIndex>0)editIndex--;
 showEdit();
}

function saveEdit(){
 tempImgs[editIndex]=canvas.toDataURL();
}

function finishEdit(){
 saveEdit();

 if(!isAnswer){
  qImgs=tempImgs;
  tempImgs=[];
  isAnswer=true;
 }else{
  aImgs=tempImgs;
  tempImgs=[];
  send();
  return;
 }

 goRegister();
}

/* ===== 送信 ===== */
async function send(){
 await fetch(URL,{
  method:"POST",
  body:JSON.stringify({
   questions:qImgs,
   answers:aImgs
  })
 });

 qImgs=[];aImgs=[];
 isAnswer=false;
 alert("保存完了");
 goHome();
}

/* 初期 */
goHome();
</script>

</body>
</html>
