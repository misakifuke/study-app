<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>完全体</title>

<style>
body {
 margin:0;
 font-family:sans-serif;
 text-align:center;
 background:#f5f5f5;
}

h2 { margin-top:60px; }

/* ボタン */
button {
 width:85%;
 height:70px;
 margin:10px;
 border:none;
 border-radius:12px;
 color:white;
 font-size:18px;
}

/* 色 */
.blue{background:#3498db;}
.green{background:#2ecc71;}
.orange{background:#f39c12;}
.red{background:#e74c3c;}
.purple{background:#9b59b6;}
.black{background:#333;}

/* 戻る */
#back{
 position:fixed;
 top:10px;
 left:10px;
 width:50px;
 height:50px;
 background:#444;
}

/* モードボタン */
.mode{
 position:fixed;
 top:10px;
 right:10px;
 width:80px;
 height:40px;
 font-size:14px;
}

.mode2{ right:100px; }

/* モード表示 */
#modeFlash{
 position:fixed;
 top:50%;
 left:50%;
 transform:translate(-50%,-50%);
 font-size:30px;
 background:rgba(0,0,0,0.6);
 color:white;
 padding:20px;
 border-radius:10px;
 display:none;
}

/* ローディング */
#loading{
 position:fixed;
 width:100%;height:100%;
 background:rgba(0,0,0,0.6);
 color:white;
 display:none;
 align-items:center;
 justify-content:center;
}

/* カメラ */
video{
 width:100%;
 height:50vh;
 object-fit:cover;
}

/* キャンバス */
canvas{
 width:100%;
 border:1px solid black;
 touch-action:none;
}

/* 復習 */
.review{
 display:flex;
 align-items:center;
 justify-content:center;
}

.arrow{
 width:50px;height:50px;
 background:#333;
 color:white;
 border-radius:50%;
}

img{
 max-width:70%;
 margin:0 10px;
}
</style>
</head>

<body>

<div id="loading">しばらくお待ちください…</div>
<div id="modeFlash"></div>

<button id="back" onclick="goHome()" style="display:none">←</button>

<div id="app"></div>

<script>
const URL="https://script.google.com/macros/s/AKfycbwoIEq2Bvxc8f1-glqP-0K_SBVdqiATr_Fti0z_Z7vGykZADJKsa3GLlPnbBPQeB-C0NA/exec";

let state="home";

/* 共通 */
function loading(v){
 document.getElementById("loading").style.display=v?"flex":"none";
}

function flash(text){
 let f=document.getElementById("modeFlash");
 f.innerText=text;
 f.style.display="block";
 setTimeout(()=>f.style.display="none",500);
}

function setView(html){
 document.getElementById("app").innerHTML=html;
 document.getElementById("back").style.display=(state==="home")?"none":"block";
}

/* ホーム */
function goHome(){
 state="home";
 setView(`
  <h2>ホーム</h2>
  <button class="blue" onclick="goRegister()">問題登録</button>
  <button class="green" onclick="goReview('normal')">問題復習</button>
  <button class="orange" onclick="goReview('alpha')">α</button>
  <button class="red" onclick="goReview('plus')">＋</button>
  <button class="purple" onclick="startFullReview()">総復習</button>
  <button class="black" onclick="continueFullReview()">続きから</button>
 `);
}

/* 登録 */
let video,canvas,ctx;
let qImgs=[],aImgs=[];
let mode="question";
let drawing=false;

function goRegister(){
 state="register";

 setView(`
  <button class="mode mode2 blue" onclick="setMode('question')">問題</button>
  <button class="mode green" onclick="setMode('answer')">答え</button>

  <video id="video" autoplay playsinline></video>
  <button class="purple" onclick="startCamera()">カメラ</button>
  <button class="orange" onclick="capture()">撮影</button>

  <canvas id="canvas"></canvas>

  <button class="blue" onclick="add()">追加</button>
  <button class="green" onclick="send()">送信</button>

  <div>問題:<span id="q">0</span> 答え:<span id="a">0</span></div>
 `);

 video=document.getElementById("video");
 canvas=document.getElementById("canvas");
 ctx=canvas.getContext("2d");

 canvas.addEventListener("touchstart",e=>{drawing=true;draw(e);});
 canvas.addEventListener("touchmove",draw);
 canvas.addEventListener("touchend",()=>drawing=false);
}

function setMode(m){
 mode=m;
 flash(m==="question"?"問題モード":"答えモード");
}

async function startCamera(){
 const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}});
 video.srcObject=s;
}

function capture(){
 canvas.width=video.videoWidth;
 canvas.height=video.videoHeight;
 ctx.drawImage(video,0,0);
}

function draw(e){
 if(!drawing)return;
 e.preventDefault();
 const rect=canvas.getBoundingClientRect();
 const scaleX=canvas.width/rect.width;
 const scaleY=canvas.height/rect.height;
 const x=(e.touches[0].clientX-rect.left)*scaleX;
 const y=(e.touches[0].clientY-rect.top)*scaleY;
 ctx.fillRect(x,y,4,4);
}

function add(){
 const img=canvas.toDataURL();
 if(mode==="question") qImgs.push(img);
 else aImgs.push(img);
 update();
}

function update(){
 document.getElementById("q").innerText=qImgs.length;
 document.getElementById("a").innerText=aImgs.length;
}

async function send(){
 loading(true);

 await fetch(URL,{
  method:"POST",
  body:JSON.stringify({
   questions:qImgs,
   answers:aImgs
  })
 });

 qImgs=[];aImgs=[];update();
 loading(false);
 alert("保存完了");
}

/* 復習 */
let data=[],set=0,page=0,mode2="q";

function startFullReview(){
 localStorage.setItem("reviewIndex",0);
 goReview("all");
}

function continueFullReview(){
 let saved=localStorage.getItem("reviewIndex");
 set=saved?parseInt(saved):0;
 goReview("all",true);
}

function getDateOnly(d){
 let x=new Date(d);
 return x.getFullYear()+"-"+(x.getMonth()+1)+"-"+x.getDate();
}

function getTargetDate(days){
 let d=new Date();
 d.setDate(d.getDate()-days);
 return getDateOnly(d);
}

function goReview(type,keep=false){
 state="review";
 loading(true);

 fetch(URL).then(r=>r.json()).then(d=>{
  let t=[];
  if(type==="alpha")t=[3,7,14];
  if(type==="plus")t=[1,3,7,14];

  data=d.filter(x=>{
   if(type==="normal"||type==="all")return true;
   return t.some(day=>getDateOnly(x.date)===getTargetDate(day));
  });

  if(!keep)set=0;
  page=0;mode2="q";

  loading(false);
  drawReview();
 });
}

function drawReview(){
 if(data.length===0){
  setView("<h2>データなし</h2>");
  return;
 }

 localStorage.setItem("reviewIndex",set);

 let s=data[set];
 let imgs=mode2==="q"?s.questions:s.answers;

 setView(`
  <h2>復習</h2>

  <div class="review">
    <button class="arrow" onclick="prev()">←</button>
    <img src="${imgs[page]}">
    <button class="arrow" onclick="next()">→</button>
  </div>

  <button class="green" onclick="switchQA()">切替</button>
  <button class="purple" onclick="nextSet()">次</button>
 `);
}

function next(){if(page<imgLen()-1)page++;drawReview();}
function prev(){if(page>0)page--;drawReview();}
function switchQA(){mode2=mode2==="q"?"a":"q";page=0;drawReview();}
function nextSet(){set=(set+1)%data.length;page=0;drawReview();}
function imgLen(){
 let s=data[set];
 return mode2==="q"?s.questions.length:s.answers.length;
}

goHome();
</script>

</body>
</html>
