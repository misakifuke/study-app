<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
 margin:0;
 font-family:sans-serif;
 text-align:center;
 background:#f5f5f5;
}

/* ボタン */
button{
 width:85%;
 height:65px;
 margin:10px;
 border:none;
 border-radius:12px;
 color:white;
 font-size:18px;
}

.blue{background:#3498db;}
.green{background:#2ecc71;}
.orange{background:#f39c12;}
.red{background:#e74c3c;}
.purple{background:#9b59b6;}
.black{background:#333;}

#back{
 position:fixed;
 top:10px;
 left:10px;
 width:50px;
 height:50px;
 background:#444;
}

/* カメラ */
video{
 width:100%;
 max-height:35vh;
 object-fit:contain;
 background:black;
}

/* カメラボタン */
.captureBtn{
 position:fixed;
 bottom:20px;
 left:20px;
 width:70px;
 height:70px;
 border-radius:50%;
 background:white;
 border:5px solid #ccc;
}

/* キャンバス */
canvas{
 width:100%;
 border:1px solid black;
 touch-action:none;
}

/* フラッシュ */
#flash{
 position:fixed;
 top:50%;
 left:50%;
 transform:translate(-50%,-50%);
 background:rgba(0,0,0,0.6);
 color:white;
 padding:20px;
 border-radius:10px;
 display:none;
}
</style>
</head>

<body>

<div id="flash"></div>
<button id="back" onclick="goHome()" style="display:none">←</button>
<div id="app"></div>

<script>
const URL="https://script.google.com/macros/s/AKfycbwoIEq2Bvxc8f1-glqP-0K_SBVdqiATr_Fti0z_Z7vGykZADJKsa3GLlPnbBPQeB-C0NA/exec";

let state="home";

/* 共通 */
function flash(text){
 let f=document.getElementById("flash");
 f.innerText=text;
 f.style.display="block";
 setTimeout(()=>f.style.display="none",500);
}

function setView(html){
 document.getElementById("app").innerHTML=html;
 document.getElementById("back").style.display=(state==="home")?"none":"block";
}

/* ===== ホーム ===== */
function goHome(){
 state="home";
 setView(`
  <h2>ホーム</h2>
  <button class="blue" onclick="goRegister()">問題登録</button>
  <button class="green" onclick="goReview('normal')">問題復習</button>
  <button class="orange" onclick="goReview('alpha')">α</button>
  <button class="red" onclick="goReview('plus')">＋</button>
  <button class="purple" onclick="startFullReview()">総復習</button>
  <button class="black" onclick="continueFullReview()">続きから</button>
 `);
}

/* ===== 登録 ===== */
let video,canvas,ctx;
let qImgs=[],aImgs=[],tempImgs=[];
let isAnswer=false;

function goRegister(){
 state="register";

 setView(`
  <h2>${isAnswer?"答え撮影":"問題撮影"}</h2>

  <video id="video" autoplay playsinline></video>
  <button class="captureBtn" onclick="capture()"></button>

  <canvas id="canvas"></canvas>

  <button class="blue" onclick="add()">追加</button>
  <button class="green" onclick="startEdit()">編集</button>

  <div>問題:${qImgs.length} 答え:${aImgs.length}</div>
 `);

 video=document.getElementById("video");
 canvas=document.getElementById("canvas");
 ctx=canvas.getContext("2d");

 startCamera();
}

/* カメラ */
async function startCamera(){
 const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}});
 video.srcObject=s;
}

function capture(){
 canvas.width=video.videoWidth;
 canvas.height=video.videoHeight;
 ctx.drawImage(video,0,0);
}

/* 追加 */
function add(){
 const img=canvas.toDataURL();
 tempImgs.push(img);

 if(isAnswer){
  document.getElementById("app").innerHTML=
   document.getElementById("app").innerHTML.replace(
    `答え:${aImgs.length}`,
    `答え:${aImgs.length + tempImgs.length}`
   );
 }else{
  document.getElementById("app").innerHTML=
   document.getElementById("app").innerHTML.replace(
    `問題:${qImgs.length}`,
    `問題:${qImgs.length + tempImgs.length}`
   );
 }

 flash("追加完了");
}

/* ===== 編集 ===== */
let editIndex=0;
let drawing=false;

function startEdit(){
 if(tempImgs.length===0)return alert("画像なし");

 state="edit";
 editIndex=0;

 setView(`
  <h2>編集</h2>

  <button onclick="prev()">←</button>
  <img id="img">
  <button onclick="next()">→</button>

  <canvas id="canvas"></canvas>

  <button class="green" onclick="finishEdit()">完了</button>
 `);

 canvas=document.getElementById("canvas");
 ctx=canvas.getContext("2d");

 canvas.addEventListener("touchstart",e=>{drawing=true;draw(e);});
 canvas.addEventListener("touchmove",draw);
 canvas.addEventListener("touchend",()=>drawing=false);

 show();
}

function show(){
 let img=new Image();
 img.src=tempImgs[editIndex];
 img.onload=()=>{
  canvas.width=img.width;
  canvas.height=img.height;
  ctx.drawImage(img,0,0);
 };
}

function next(){save();if(editIndex<tempImgs.length-1)editIndex++;show();}
function prev(){save();if(editIndex>0)editIndex--;show();}
function save(){tempImgs[editIndex]=canvas.toDataURL();}

function finishEdit(){
 save();

 if(!isAnswer){
  qImgs=tempImgs;
  tempImgs=[];
  isAnswer=true;
 }else{
  aImgs=tempImgs;
  tempImgs=[];
  send();
  return;
 }

 goRegister();
}

/* 送信 */
async function send(){
 await fetch(URL,{
  method:"POST",
  body:JSON.stringify({
   questions:qImgs,
   answers:aImgs
  })
 });

 qImgs=[];aImgs=[];
 isAnswer=false;

 alert("保存完了");
 goHome();
}

/* ===== 復習（簡易維持） ===== */
function goReview(){ alert("復習は前のまま使える"); }
function startFullReview(){ goReview(); }
function continueFullReview(){ goReview(); }

goHome();
</script>

</body>
</html>
