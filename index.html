<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>問題登録アプリ</title>

<style>
body {
  text-align: center;
  font-family: sans-serif;
}

video, canvas {
  width: 100%;
  max-width: 400px;
}

canvas {
  border: 1px solid black;
  touch-action: none;
}

button {
  margin: 5px;
  padding: 10px;
}
</style>
</head>

<body>

<h1>問題登録</h1>

<video id="video" autoplay playsinline></video><br>

<button onclick="startCamera()">カメラ起動</button>
<button onclick="takePhoto()">撮影</button>
<button onclick="resetPhoto()">撮り直し</button>

<br><br>

<canvas id="canvas"></canvas>

<br>

<button onclick="sendData()">送信</button>

<hr>

<h2>モード</h2>
<button onclick="mode='normal'">通常</button>
<button onclick="mode='plus'">＋</button>
<button onclick="mode='alpha'">α</button>

<h2>問題数・答え数</h2>
<p id="count">問題: 0 / 答え: 0</p>

<hr>

<h2>復習</h2>
<button onclick="loadReview()">復習スタート</button>
<br><br>
<img id="reviewImage" width="300"><br>
<button onclick="showAnswer()">答え</button>

<script>
let video = document.getElementById("video");
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");

let mode = "normal";
let drawing = false;
let problemCount = 0;
let answerCount = 0;

let reviewData = [];
let currentIndex = 0;

const GAS_URL = "https://script.google.com/macros/s/AKfycby8F6D6aj_5xq8nPH-sNjQB4BEtMydS2WWilCkFQ8ngicr4LA4plCpj4o7vQ4PXTIOW/exec";

// カメラ
async function startCamera() {
  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: "environment" }
  });
  video.srcObject = stream;
}

// 撮影（ズレ修正ポイント①）
function takePhoto() {
  const rect = video.getBoundingClientRect();

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.drawImage(video, 0, 0);
}

// 描画（ズレ完全修正）
canvas.addEventListener("touchmove", e => {
  if (!drawing) return;

  const rect = canvas.getBoundingClientRect();

  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;

  const x = (e.touches[0].clientX - rect.left) * scaleX;
  const y = (e.touches[0].clientY - rect.top) * scaleY;

  ctx.fillRect(x, y, 3, 3);

  e.preventDefault();
});

canvas.addEventListener("touchstart", () => drawing = true);
canvas.addEventListener("touchend", () => drawing = false);

// 撮り直し
function resetPhoto() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
}

// 送信
function sendData() {
  const image = canvas.toDataURL("image/png");

  fetch(GAS_URL, {
    method: "POST",
    body: JSON.stringify({
      image: image,
      mode: mode
    })
  })
  .then(() => {
    alert("送信成功");

    problemCount++;
    if (mode !== "normal") answerCount++;

    document.getElementById("count").innerText =
      "問題: " + problemCount + " / 答え: " + answerCount;

    resetPhoto();
  })
  .catch(() => alert("送信失敗"));
}

// ===== 復習機能 =====

// データ取得
function loadReview() {
  fetch(GAS_URL)
    .then(res => res.json())
    .then(data => {
      reviewData = data;
      currentIndex = 0;
      showQuestion();
    });
}

// 問題表示
function showQuestion() {
  if (reviewData.length === 0) return;

  document.getElementById("reviewImage").src =
    reviewData[currentIndex].image;
}

// 答え表示
function showAnswer() {
  currentIndex++;

  if (currentIndex >= reviewData.length) {
    alert("終了！");
    return;
  }

  showQuestion();
}
</script>

</body>
</html>
