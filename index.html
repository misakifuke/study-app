<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{margin:0;font-family:sans-serif;text-align:center;background:#f5f5f5;}

button{
 width:90%;
 height:70px;
 margin:10px;
 border:none;
 border-radius:14px;
 color:white;
 font-size:18px;
}

.blue{background:#3498db;}
.green{background:#2ecc71;}
.orange{background:#f39c12;}
.red{background:#e74c3c;}
.purple{background:#9b59b6;}
.dark{background:#222;}

#back{
 position:fixed;top:10px;left:10px;
 width:55px;height:55px;
 background:#222;color:white;
}

/* カメラ（横固定） */
video{
 width:92%;
 aspect-ratio:16/9;
 object-fit:cover;
 border-radius:12px;
 display:block;
 margin:10px auto;
}

/* 🔥 画像＝そのまま */
img{
 width:92%;
 height:auto;
 border-radius:12px;
 display:block;
 margin:10px auto;
}

/* 編集 */
#canvas{
 width:92%;
 height:auto;
 display:block;
 margin:10px auto;
 border-radius:12px;
}

.captureBtn{
 position:fixed;
 bottom:20px;left:50%;
 transform:translateX(-50%);
 width:75px;height:75px;
 border-radius:50%;
 background:white;
 border:5px solid #ccc;
}

.wrap{position:relative;width:100%;}
.arrow{
 position:absolute;
 top:50%;
 transform:translateY(-50%);
 width:50px;height:50px;
 border-radius:50%;
 background:#222;color:white;
}
.left{left:10px;}
.right{right:10px;}

#flash,#loading{
 position:fixed;
 top:50%;left:50%;
 transform:translate(-50%,-50%);
 background:rgba(0,0,0,0.85);
 color:white;
 padding:20px;
 border-radius:10px;
 display:none;
}
</style>
</head>

<body>

<div id="flash"></div>
<div id="loading">しばらくお待ちください...</div>
<button id="back" onclick="goBack()" style="display:none">←</button>
<div id="app"></div>

<script>
const URL="https://script.google.com/macros/s/AKfycbwoIEq2Bvxc8f1-glqP-0K_SBVdqiATr_Fti0z_Z7vGykZADJKsa3GLlPnbBPQeB-C0NA/exec";

let history=[];
let captured=null;

let state={
 screen:"home",
 qImgs:[],aImgs:[],tempImgs:[],
 isAnswer:false,editIndex:0,
 reviewData:[],
 reviewIndex:0,
 reviewSubIndex:0,
 modeQA:"q"
};

let video,canvas,ctx;

/* 共通 */
function flash(t){
 let f=document.getElementById("flash");
 f.innerText=t;
 f.style.display="block";
 setTimeout(()=>f.style.display="none",500);
}
function loading(on){
 document.getElementById("loading").style.display=on?"block":"none";
}
function save(){
 history.push(JSON.parse(JSON.stringify(state)));
 document.getElementById("back").style.display="block";
}
function goBack(){
 if(!history.length)return;
 state=history.pop();
 render();
 if(!history.length) document.getElementById("back").style.display="none";
}

/* 画面 */
function render(){
 if(state.screen==="home") home();
 if(state.screen==="register") register();
 if(state.screen==="edit") edit();
 if(state.screen==="review") review();
}

/* ホーム */
function home(){
 document.getElementById("back").style.display="none";
 document.getElementById("app").innerHTML=`
  <h2>ホーム</h2>
  <button class="blue" onclick="goRegister()">問題登録</button>
  <button class="green" onclick="startReview('normal')">問題復習</button>
  <button class="orange" onclick="startReview('alpha')">問題復習α</button>
  <button class="red" onclick="startReview('plus')">問題復習＋</button>
  <button class="purple" onclick="startReview('all')">総復習</button>
  <button class="dark" onclick="startReview('continue')">続きから総復習</button>
 `;
}

/* 登録 */
function goRegister(){save();state.screen="register";render();}

function register(){
 document.getElementById("app").innerHTML=`
  <h2>${state.isAnswer?"答え撮影":"問題撮影"}</h2>

  <video id="video" autoplay playsinline muted></video>
  <img id="preview" style="display:none">

  <button class="captureBtn" onclick="capture()"></button>

  ${!state.isAnswer ? `<button class="green" onclick="goEdit()">編集</button>` : ""}
  ${state.isAnswer ? `<button class="red" onclick="send()">送信</button>` : ""}

  <div id="controls"></div>
 `;

 video=document.getElementById("video");
 startCamera();
}

/* 横固定取得 */
async function startCamera(){
 const s=await navigator.mediaDevices.getUserMedia({
  video:{
   facingMode:"environment",
   aspectRatio:16/9
  }
 });
 video.srcObject=s;
}

/* 🔥 完全そのまま保存（回転なし） */
function capture(){
 let c=document.createElement("canvas");
 let ctx=c.getContext("2d");

 c.width=video.videoWidth;
 c.height=video.videoHeight;

 ctx.drawImage(video,0,0);

 captured=c.toDataURL();

 video.style.display="none";
 let img=document.getElementById("preview");
 img.src=captured;
 img.style.display="block";

 document.getElementById("controls").innerHTML=`
  <button class="blue" onclick="addOne()">追加</button>
  <button class="orange" onclick="retake()">撮り直し</button>
 `;
}

function addOne(){
 state.tempImgs.push(captured);
 flash("追加完了");

 captured=null;
 document.getElementById("preview").style.display="none";
 video.style.display="block";
 document.getElementById("controls").innerHTML="";
}

function retake(){
 captured=null;
 document.getElementById("preview").style.display="none";
 video.style.display="block";
 document.getElementById("controls").innerHTML="";
}

/* 編集（そのまま描画） */
function goEdit(){
 if(state.tempImgs.length===0)return alert("画像なし");
 save();
 state.screen="edit";
 state.editIndex=0;
 render();
}

let drawing=false;

function edit(){
 document.getElementById("app").innerHTML=`
  <h2>編集</h2>
  <div class="wrap">
    <button class="arrow left" onclick="prev()">←</button>
    <canvas id="canvas"></canvas>
    <button class="arrow right" onclick="next()">→</button>
  </div>
  <button class="green" onclick="finishEdit()">完了</button>
 `;

 canvas=document.getElementById("canvas");
 ctx=canvas.getContext("2d");

 canvas.addEventListener("touchstart",e=>{drawing=true;draw(e)},{passive:false});
 canvas.addEventListener("touchmove",e=>{if(drawing)draw(e)},{passive:false});
 canvas.addEventListener("touchend",()=>drawing=false);

 show();
}

function show(){
 let img=new Image();
 img.src=state.tempImgs[state.editIndex];
 img.onload=()=>{
  canvas.width=img.width;
  canvas.height=img.height;
  ctx.drawImage(img,0,0);
 };
}

function draw(e){
 e.preventDefault();
 const rect = canvas.getBoundingClientRect();
 const scaleX = canvas.width / rect.width;
 const scaleY = canvas.height / rect.height;
 const x = (e.touches[0].clientX - rect.left) * scaleX;
 const y = (e.touches[0].clientY - rect.top) * scaleY;
 ctx.fillStyle="red";
 ctx.fillRect(x,y,5,5);
}

function next(){saveEdit();if(state.editIndex<state.tempImgs.length-1)state.editIndex++;show();}
function prev(){saveEdit();if(state.editIndex>0)state.editIndex--;show();}
function saveEdit(){state.tempImgs[state.editIndex]=canvas.toDataURL();}

function finishEdit(){
 saveEdit();
 state.qImgs=state.qImgs.concat(state.tempImgs);
 state.tempImgs=[];
 state.isAnswer=true;
 state.screen="register";
 render();
}

/* 送信 */
async function send(){
 state.aImgs=state.aImgs.concat(state.tempImgs);
 state.tempImgs=[];
 loading(true);

 await fetch(URL,{
  method:"POST",
  body:JSON.stringify({
   questions:state.qImgs,
   answers:state.aImgs
  })
 });

 loading(false);

 state={screen:"home",qImgs:[],aImgs:[],tempImgs:[],isAnswer:false};
 history=[];
 render();
}

/* 復習 */
function isSameDay(d1,d2){
 return d1.getFullYear()===d2.getFullYear() &&
        d1.getMonth()===d2.getMonth() &&
        d1.getDate()===d2.getDate();
}

async function startReview(mode){
 save();
 loading(true);

 let res=await fetch(URL);
 let all=await res.json();

 let now=new Date();
 let get=n=>{let d=new Date();d.setDate(now.getDate()-n);return d;}

 if(mode==="normal"){
  state.reviewData=all.filter(x=>isSameDay(new Date(x.date),get(1)));
 }
 else if(mode==="alpha"){
  state.reviewData=all.filter(x=>[3,7,14].some(n=>isSameDay(new Date(x.date),get(n))));
 }
 else if(mode==="plus"){
  state.reviewData=all.filter(x=>[1,3,7,14].some(n=>isSameDay(new Date(x.date),get(n))));
 }
 else if(mode==="continue"){
  state.reviewData=all;
  state.reviewIndex=+localStorage.getItem("i")||0;
  state.reviewSubIndex=+localStorage.getItem("j")||0;
 }
 else{
  state.reviewData=all;
 }

 state.screen="review";
 loading(false);
 render();
}

function review(){
 let d=state.reviewData[state.reviewIndex];
 if(!d)return document.getElementById("app").innerHTML="データなし";

 let list=state.modeQA==="q"?d.questions:d.answers;

 document.getElementById("app").innerHTML=`
  <div class="wrap">
    <button class="arrow left" onclick="prevImg()">←</button>
    <img src="${list[state.reviewSubIndex]}">
    <button class="arrow right" onclick="nextImg()">→</button>
  </div>
  <button class="green" onclick="toggleQA()">切替</button>
  <button class="dark" onclick="saveProgress()">保存</button>
 `;
}

function nextImg(){
 let d=state.reviewData[state.reviewIndex];
 let list=state.modeQA==="q"?d.questions:d.answers;

 if(state.reviewSubIndex<list.length-1){
  state.reviewSubIndex++;
 }else if(state.reviewIndex<state.reviewData.length-1){
  state.reviewIndex++;
  state.reviewSubIndex=0;
 }
 render();
}

function prevImg(){
 if(state.reviewSubIndex>0){
  state.reviewSubIndex--;
 }else if(state.reviewIndex>0){
  state.reviewIndex--;
  let d=state.reviewData[state.reviewIndex];
  let list=state.modeQA==="q"?d.questions:d.answers;
  state.reviewSubIndex=list.length-1;
 }
 render();
}

function toggleQA(){
 state.modeQA=state.modeQA==="q"?"a":"q";
 state.reviewSubIndex=0;
 render();
}

function saveProgress(){
 localStorage.setItem("i",state.reviewIndex);
 localStorage.setItem("j",state.reviewSubIndex);
 flash("保存完了");
}

render();
</script>
</body>
</html>
