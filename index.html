<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>完全体</title>

<style>
body {
 font-family:sans-serif;
 text-align:center;
 margin:0;
}

h2 {
 margin-top:60px;
}

/* 🔥 ボタン強化 */
button {
 width:80%;
 height:80px;
 font-size:18px;
 margin:10px;
 border-radius:12px;
}

/* 小さいボタン（復習用） */
.small-btn {
 width:60px;
 height:60px;
 font-size:20px;
}

/* 🔥 ローディング */
#loading {
 position:fixed;
 top:0; left:0;
 width:100%; height:100%;
 background:rgba(0,0,0,0.6);
 color:#fff;
 display:none;
 align-items:center;
 justify-content:center;
}

/* 🔥 戻るボタン */
#back {
 position:fixed;
 top:10px;
 left:10px;
 width:60px;
 height:60px;
 z-index:10;
}

/* 🔥 画像 */
video, canvas, img {
 width:100%;
 max-width:400px;
}

/* 🔥 復習UI */
.review-container {
 position:relative;
 display:flex;
 justify-content:center;
 align-items:center;
}

.arrow {
 position:absolute;
 top:50%;
 transform:translateY(-50%);
}

.left { left:5px; }
.right { right:5px; }

canvas {
 border:1px solid black;
 touch-action:none;
}
</style>
</head>

<body>

<div id="loading">しばらくお待ちください…</div>
<button id="back" onclick="goHome()" style="display:none">←</button>

<div id="app"></div>

<script>
const URL="https://script.google.com/macros/s/AKfycbwoIEq2Bvxc8f1-glqP-0K_SBVdqiATr_Fti0z_Z7vGykZADJKsa3GLlPnbBPQeB-C0NA/exec";

let state="home";

function loading(v){
 document.getElementById("loading").style.display=v?"flex":"none";
}

function setView(html){
 document.getElementById("app").innerHTML=html;
 document.getElementById("back").style.display=(state==="home")?"none":"block";
}

// ===== ホーム =====
function goHome(){
 state="home";
 setView(`
  <h2>📚 ホーム</h2>
  <button onclick="goRegister()">問題登録</button>
  <button onclick="goReview('normal')">問題復習</button>
  <button onclick="goReview('alpha')">問題復習α</button>
  <button onclick="goReview('plus')">問題復習＋</button>
  <button onclick="goReview('all')">総復習</button>
 `);
}

// ===== 登録 =====
let video,canvas,ctx;
let qImgs=[],aImgs=[];
let mode="question";
let drawing=false;

function goRegister(){
 state="register";

 setView(`
  <h2>問題登録</h2>
  <button onclick="mode='question'">問題</button>
  <button onclick="mode='answer'">答え</button>

  <video id="video" autoplay playsinline></video>
  <button onclick="startCamera()">カメラ</button>
  <button onclick="capture()">撮影</button>

  <canvas id="canvas"></canvas>

  <button onclick="add()">追加</button>
  <button onclick="send()">送信</button>

  <div>問題:<span id="q">0</span> 答え:<span id="a">0</span></div>
 `);

 video=document.getElementById("video");
 canvas=document.getElementById("canvas");
 ctx=canvas.getContext("2d");

 canvas.addEventListener("touchstart",e=>{drawing=true;draw(e);});
 canvas.addEventListener("touchmove",draw);
 canvas.addEventListener("touchend",()=>drawing=false);
}

async function startCamera(){
 const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}});
 video.srcObject=s;
}

function capture(){
 canvas.width=video.videoWidth;
 canvas.height=video.videoHeight;
 ctx.drawImage(video,0,0);
}

function draw(e){
 if(!drawing)return;
 e.preventDefault();
 const rect=canvas.getBoundingClientRect();
 const scaleX=canvas.width/rect.width;
 const scaleY=canvas.height/rect.height;
 const x=(e.touches[0].clientX-rect.left)*scaleX;
 const y=(e.touches[0].clientY-rect.top)*scaleY;
 ctx.fillRect(x,y,4,4);
}

function add(){
 const img=canvas.toDataURL();
 if(mode==="question") qImgs.push(img);
 else aImgs.push(img);
 update();
}

function update(){
 document.getElementById("q").innerText=qImgs.length;
 document.getElementById("a").innerText=aImgs.length;
}

async function send(){
 loading(true);

 await fetch(URL,{
  method:"POST",
  body:JSON.stringify({
   questions:qImgs,
   answers:aImgs
  })
 });

 qImgs=[];aImgs=[];update();
 loading(false);
 alert("保存完了");
}

// ===== 日付処理 =====
function getDateOnly(date){
 let d=new Date(date);
 return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate();
}

function getTargetDate(days){
 let d=new Date();
 d.setDate(d.getDate()-days);
 return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate();
}

// ===== 復習 =====
let data=[],set=0,page=0,mode2="q";

function goReview(type){
 state="review";
 loading(true);

 fetch(URL).then(r=>r.json()).then(d=>{

  let targets=[];
  if(type==="alpha") targets=[3,7,14];
  if(type==="plus") targets=[1,3,7,14];

  data = d.filter(x=>{
    if(type==="normal"||type==="all") return true;

    let date=getDateOnly(x.date);
    return targets.some(day=>date===getTargetDate(day));
  });

  set=0;page=0;mode2="q";
  loading(false);
  drawReview();
 });
}

function drawReview(){
 if(data.length===0){
  setView("<h2>データなし</h2>");
  return;
 }

 let s=data[set];
 let imgs=mode2==="q"?s.questions:s.answers;

 setView(`
  <h2>復習</h2>

  <div class="review-container">
    <button class="small-btn arrow left" onclick="prev()">←</button>
    <img src="${imgs[page]}">
    <button class="small-btn arrow right" onclick="next()">→</button>
  </div>

  <button onclick="switchQA()">問題⇄答え</button>
  <button onclick="nextSet()">次のセット</button>
 `);
}

function next(){ if(page<imgLen()-1)page++; drawReview(); }
function prev(){ if(page>0)page--; drawReview(); }
function switchQA(){ mode2=mode2==="q"?"a":"q"; page=0; drawReview(); }
function nextSet(){ set=(set+1)%data.length; page=0; drawReview(); }

function imgLen(){
 let s=data[set];
 return mode2==="q"?s.questions.length:s.answers.length;
}

// 初期
goHome();
</script>

</body>
</html>
