<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
 margin:0;
 font-family:sans-serif;
 text-align:center;
 background:#f5f5f5;
}

/* ボタン */
button{
 width:85%;
 height:65px;
 margin:10px;
 border:none;
 border-radius:12px;
 color:white;
 font-size:18px;
}

.blue{background:#3498db;}
.green{background:#2ecc71;}
.orange{background:#f39c12;}
.red{background:#e74c3c;}
.purple{background:#9b59b6;}
.dark{background:#222;}

#back{
 position:fixed;
 top:10px;
 left:10px;
 width:50px;
 height:50px;
 background:#222;
 color:white;
}

/* カメラ */
video{
 width:90%;
 height:55vh;
 object-fit:cover;
 border-radius:10px;
}

/* 撮影後 */
canvas{
 width:90%;
 max-height:55vh;
 border:1px solid black;
 border-radius:10px;
}

/* 編集画像 */
.imgWrap{
 position:relative;
 display:inline-block;
}

img{
 width:90%;
 max-height:55vh;
 border-radius:10px;
}

/* ← → */
.arrow{
 position:absolute;
 top:50%;
 transform:translateY(-50%);
 width:50px;
 height:50px;
 border-radius:50%;
 background:#222;
 color:white;
}

.left{left:-60px;}
.right{right:-60px;}

/* カメラボタン */
.captureBtn{
 position:fixed;
 bottom:20px;
 left:20px;
 width:70px;
 height:70px;
 border-radius:50%;
 background:white;
 border:5px solid #ccc;
}

/* フラッシュ */
#flash{
 position:fixed;
 top:50%;
 left:50%;
 transform:translate(-50%,-50%);
 background:rgba(0,0,0,0.6);
 color:white;
 padding:20px;
 border-radius:10px;
 display:none;
}
</style>
</head>

<body>

<div id="flash"></div>
<button id="back" onclick="goHome()" style="display:none">←</button>
<div id="app"></div>

<script>
const URL="https://script.google.com/macros/s/AKfycbwoIEq2Bvxc8f1-glqP-0K_SBVdqiATr_Fti0z_Z7vGykZADJKsa3GLlPnbBPQeB-C0NA/exec";

/* ===== 状態 ===== */
let qImgs=[],aImgs=[],tempImgs=[];
let isAnswer=false;
let video,canvas,ctx;
let editIndex=0;
let drawing=false;

/* ===== 共通 ===== */
function flash(text){
 let f=document.getElementById("flash");
 f.innerText=text;
 f.style.display="block";
 setTimeout(()=>f.style.display="none",500);
}

function setView(html){
 document.getElementById("app").innerHTML=html;
 document.getElementById("back").style.display="block";
}

/* ===== ホーム ===== */
function goHome(){
 document.getElementById("back").style.display="none";

 document.getElementById("app").innerHTML=`
  <h2>ホーム</h2>
  <button class="blue" onclick="goRegister()">問題登録</button>
  <button class="green">問題復習</button>
  <button class="orange">α</button>
  <button class="red">＋</button>
  <button class="purple">総復習</button>
  <button class="dark">続きから</button>
 `;
}

/* ===== 登録 ===== */
function goRegister(){

 setView(`
  <h2>${isAnswer?"答え撮影":"問題撮影"}</h2>

  <video id="video" autoplay playsinline muted></video>
  <button class="captureBtn" onclick="capture()"></button>

  <canvas id="canvas"></canvas>

  <button class="blue" onclick="add()">追加</button>
  <button class="green" onclick="startEdit()">編集</button>

  <div id="count">問題:${qImgs.length + (!isAnswer?tempImgs.length:0)} 答え:${aImgs.length + (isAnswer?tempImgs.length:0)}</div>
 `);

 video=document.getElementById("video");
 canvas=document.getElementById("canvas");
 ctx=canvas.getContext("2d");

 startCamera();
}

/* カメラ */
async function startCamera(){
 const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}});
 video.srcObject=s;
}

function capture(){
 canvas.width=video.videoWidth;
 canvas.height=video.videoHeight;
 ctx.drawImage(video,0,0);
}

/* 追加 */
function add(){
 if(canvas.width===0)return alert("先に撮影");

 tempImgs.push(canvas.toDataURL());
 updateCount();
 flash("追加完了");
}

function updateCount(){
 document.getElementById("count").innerText=
  `問題:${qImgs.length + (!isAnswer?tempImgs.length:0)} 答え:${aImgs.length + (isAnswer?tempImgs.length:0)}`;
}

/* ===== 編集 ===== */
function startEdit(){
 if(tempImgs.length===0)return alert("画像なし");

 editIndex=0;

 setView(`
  <h2>編集</h2>

  <div class="imgWrap">
    <button class="arrow left" onclick="prev()">←</button>
    <img id="img">
    <button class="arrow right" onclick="next()">→</button>
  </div>

  <canvas id="canvas"></canvas>

  <button class="green" onclick="finishEdit()">完了</button>
 `);

 canvas=document.getElementById("canvas");
 ctx=canvas.getContext("2d");

 canvas.addEventListener("touchstart",e=>{drawing=true;draw(e);});
 canvas.addEventListener("touchmove",draw);
 canvas.addEventListener("touchend",()=>drawing=false);

 show();
}

function show(){
 let img=new Image();
 img.src=tempImgs[editIndex];
 img.onload=()=>{
  canvas.width=img.width;
  canvas.height=img.height;
  ctx.drawImage(img,0,0);
 };
}

function draw(e){
 if(!drawing)return;
 e.preventDefault();
 const rect=canvas.getBoundingClientRect();
 const x=(e.touches[0].clientX-rect.left)*(canvas.width/rect.width);
 const y=(e.touches[0].clientY-rect.top)*(canvas.height/rect.height);
 ctx.fillRect(x,y,4,4);
}

function next(){save();if(editIndex<tempImgs.length-1)editIndex++;show();}
function prev(){save();if(editIndex>0)editIndex--;show();}
function save(){tempImgs[editIndex]=canvas.toDataURL();}

function finishEdit(){
 save();

 if(!isAnswer){
  qImgs=qImgs.concat(tempImgs);
  tempImgs=[];
  isAnswer=true;
 }else{
  aImgs=aImgs.concat(tempImgs);
  tempImgs=[];
  send();
  return;
 }

 goRegister();
}

/* 送信 */
async function send(){
 await fetch(URL,{
  method:"POST",
  body:JSON.stringify({
   questions:qImgs,
   answers:aImgs
  })
 });

 qImgs=[];aImgs=[];
 isAnswer=false;

 alert("保存完了");
 goHome();
}

/* 初期 */
goHome();
</script>

</body>
</html>
