<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>問題登録</title>
<style>
  body { text-align: center; }

  #container {
    position: relative;
    display: inline-block;
  }

  video, canvas {
    width: 100%;
    max-width: 400px;
    display: block;
  }

  canvas {
    position: absolute;
    top: 0;
    left: 0;
  }

  button {
    margin: 5px;
  }
</style>
</head>
<body>

<h2>問題登録</h2>

<p id="mode">モード：問題</p>

<button onclick="setMode('question')">問題モード</button>
<button onclick="setMode('answer')">答えモード</button>

<br><br>

<button onclick="startCamera()">カメラ起動</button>
<button onclick="takePhoto()">撮影</button>

<br><br>

<div id="container">
  <video id="video" autoplay playsinline></video>
  <canvas id="canvas"></canvas>
</div>

<p>問題枚数：<span id="qCount">0</span></p>
<p>答え枚数：<span id="aCount">0</span></p>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let mode = "question";

let questions = [];
let answers = [];

// モード切り替え
function setMode(m) {
  mode = m;
  document.getElementById("mode").innerText = 
    m === "question" ? "モード：問題" : "モード：答え";
}

// カメラ
async function startCamera() {
  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: "environment" }
  });
  video.srcObject = stream;

  video.onloadedmetadata = () => {
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
  };
}

// 撮影
function takePhoto() {
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

  let img = canvas.toDataURL("image/png");

  if (mode === "question") {
    questions.push(img);
    document.getElementById("qCount").innerText = questions.length;
  } else {
    answers.push(img);
    document.getElementById("aCount").innerText = answers.length;
  }

  console.log("問題", questions);
  console.log("答え", answers);
}

// 手書き
let drawing = false;

canvas.addEventListener("touchstart", (e) => {
  drawing = true;
  draw(e);
});

canvas.addEventListener("touchend", () => {
  drawing = false;
  ctx.beginPath();
});

canvas.addEventListener("touchmove", (e) => {
  if (!drawing) return;
  draw(e);
});

function draw(e) {
  e.preventDefault();

  const rect = canvas.getBoundingClientRect();

  const x = (e.touches[0].clientX - rect.left) * (canvas.width / rect.width);
  const y = (e.touches[0].clientY - rect.top) * (canvas.height / rect.height);

  ctx.lineWidth = 4;
  ctx.lineCap = "round";

  ctx.lineTo(x, y);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(x, y);
}
</script>

</body>
</html>
