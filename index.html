<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>完全体アプリ</title>

<style>
body { text-align:center; font-family:sans-serif; }
video, canvas { width:100%; max-width:400px; }
canvas { border:1px solid black; touch-action:none; }
button { margin:5px; padding:10px; }
</style>
</head>

<body>

<h1>問題登録</h1>

<video id="video" autoplay playsinline></video><br>

<button onclick="startCamera()">カメラ起動</button>
<button onclick="takePhoto()">撮影</button>

<canvas id="canvas"></canvas>

<br>

<button onclick="addPage()">このページ追加</button>
<button onclick="resetCanvas()">描き直し</button>

<h2 id="status">問題:0枚 / 答え:0枚</h2>

<h2>モード</h2>
<button onclick="mode='question'">問題</button>
<button onclick="mode='answer'">答え</button>

<button onclick="send()">送信</button>

<hr>

<h2>復習</h2>
<button onclick="loadReview()">開始</button><br><br>

<img id="reviewImage" width="300"><br>
<button onclick="nextPage()">次ページ</button>
<button onclick="toggleQA()">問題/答え切替</button>
<button onclick="nextSet()">次の問題</button>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycby8F6D6aj_5xq8nPH-sNjQB4BEtMydS2WWilCkFQ8ngicr4LA4plCpj4o7vQ4PXTIOW/exec";

let video = document.getElementById("video");
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");

let drawing=false;
let mode="question";

let questionImages=[];
let answerImages=[];

// カメラ
async function startCamera(){
 const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}});
 video.srcObject=stream;
}

// 撮影
function takePhoto(){
 canvas.width=video.videoWidth;
 canvas.height=video.videoHeight;
 ctx.drawImage(video,0,0);
}

// カウント更新
function updateCount(){
 document.getElementById("status").innerText =
  "問題:"+questionImages.length+"枚 / 答え:"+answerImages.length+"枚";
}

// 追加
function addPage(){
 const img=canvas.toDataURL("image/png");

 if(mode==="question"){
  questionImages.push(img);
 }else{
  answerImages.push(img);
 }

 updateCount();
 ctx.clearRect(0,0,canvas.width,canvas.height);
}

// リセット
function resetCanvas(){
 ctx.clearRect(0,0,canvas.width,canvas.height);
}

// 送信（まとめて）
function send(){
 if(questionImages.length===0 || answerImages.length===0){
  alert("問題と答え両方必要");
  return;
 }

 fetch(GAS_URL,{
  method:"POST",
  body:JSON.stringify({images:questionImages,type:"question"})
 })
 .then(()=>{
  return fetch(GAS_URL,{
   method:"POST",
   body:JSON.stringify({images:answerImages,type:"answer"})
  });
 })
 .then(()=>{
  alert("保存完了");
  questionImages=[];
  answerImages=[];
  updateCount();
 });
}

// 描画ズレ完全修正
canvas.addEventListener("touchmove",e=>{
 if(!drawing)return;
 const rect=canvas.getBoundingClientRect();
 const scaleX=canvas.width/rect.width;
 const scaleY=canvas.height/rect.height;
 const x=(e.touches[0].clientX-rect.left)*scaleX;
 const y=(e.touches[0].clientY-rect.top)*scaleY;
 ctx.fillRect(x,y,3,3);
 e.preventDefault();
});
canvas.addEventListener("touchstart",()=>drawing=true);
canvas.addEventListener("touchend",()=>drawing=false);

// ===== 復習 =====
let data=[];
let setIndex=0;
let pageIndex=0;
let isAnswer=false;

function loadReview(){
 fetch(GAS_URL)
 .then(r=>r.json())
 .then(d=>{
  data=d;
  setIndex=0;
  pageIndex=0;
  isAnswer=false;
  show();
 });
}

function show(){
 if(data.length===0)return;
 let set=data[setIndex];
 let imgs=isAnswer?set.answer:set.question;
 document.getElementById("reviewImage").src=imgs[pageIndex];
}

function nextPage(){
 let set=data[setIndex];
 let imgs=isAnswer?set.answer:set.question;
 pageIndex++;
 if(pageIndex>=imgs.length){pageIndex=0;}
 show();
}

function toggleQA(){
 isAnswer=!isAnswer;
 pageIndex=0;
 show();
}

function nextSet(){
 setIndex++;
 pageIndex=0;
 isAnswer=false;
 if(setIndex>=data.length){
  alert("終了");
  return;
 }
 show();
}

// 初期表示
updateCount();
</script>

</body>
</html>
