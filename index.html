<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>問題登録アプリ</title>

<style>
body {
  text-align: center;
  font-family: sans-serif;
}

video, canvas {
  width: 100%;
  max-width: 400px;
}

button {
  margin: 5px;
  padding: 10px;
  font-size: 16px;
}

#canvas {
  border: 1px solid black;
  touch-action: none;
}
</style>
</head>

<body>

<h1>問題登録</h1>

<video id="video" autoplay playsinline></video>
<br>

<button onclick="startCamera()">カメラ起動</button>
<button onclick="takePhoto()">撮影</button>
<button onclick="resetPhoto()">撮り直し</button>

<br><br>

<canvas id="canvas"></canvas>

<br>

<button onclick="sendData()">送信</button>

<hr>

<h2>モード</h2>
<button onclick="mode='normal'">通常</button>
<button onclick="mode='plus'">＋</button>
<button onclick="mode='alpha'">α</button>

<h2>問題数・答え数</h2>
<p id="count">問題: 0 / 答え: 0</p>

<script>
let video = document.getElementById("video");
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");

let mode = "normal";
let drawing = false;
let problemCount = 0;
let answerCount = 0;

// ⭐ あなたのURL（ここはもうOK）
const GAS_URL = "https://script.google.com/macros/s/AKfycby8F6D6aj_5xq8nPH-sNjQB4BEtMydS2WWilCkFQ8ngicr4LA4plCpj4o7vQ4PXTIOW/exec";

// カメラ起動（外カメラ）
async function startCamera() {
  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: "environment" }
  });
  video.srcObject = stream;
}

// 撮影
function takePhoto() {
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  ctx.drawImage(video, 0, 0);
}

// 撮り直し
function resetPhoto() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
}

// 描画
canvas.addEventListener("touchstart", e => {
  drawing = true;
});

canvas.addEventListener("touchend", e => {
  drawing = false;
});

canvas.addEventListener("touchmove", e => {
  if (!drawing) return;

  const rect = canvas.getBoundingClientRect();
  const x = e.touches[0].clientX - rect.left;
  const y = e.touches[0].clientY - rect.top;

  ctx.fillRect(x, y, 3, 3);

  e.preventDefault(); // ←スクロール防止
});

// 送信
function sendData() {
  const image = canvas.toDataURL("image/png");

  fetch(GAS_URL, {
    method: "POST",
    body: JSON.stringify({
      image: image,
      mode: mode
    })
  })
  .then(() => {
    alert("送信成功！");

    problemCount++;
    if (mode !== "normal") answerCount++;

    document.getElementById("count").innerText =
      "問題: " + problemCount + " / 答え: " + answerCount;

    resetPhoto();
  })
  .catch(() => alert("送信失敗"));
}
</script>

</body>
</html>
