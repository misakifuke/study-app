<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{margin:0;font-family:sans-serif;text-align:center;background:#f5f5f5;}
button{width:85%;height:65px;margin:10px;border:none;border-radius:12px;color:white;font-size:18px;}

.blue{background:#3498db;}
.green{background:#2ecc71;}
.orange{background:#f39c12;}
.red{background:#e74c3c;}
.purple{background:#9b59b6;}
.dark{background:#222;}

#back{position:fixed;top:10px;left:10px;width:50px;height:50px;background:#222;color:white;}

img{width:90%;max-height:60vh;border-radius:10px;}

.arrow{
 position:fixed;
 top:50%;
 transform:translateY(-50%);
 width:50px;height:50px;
 border-radius:50%;
 background:#222;color:white;
}
.left{left:5px;}
.right{right:5px;}

#loading{
 position:fixed;
 top:50%;left:50%;
 transform:translate(-50%,-50%);
 background:rgba(0,0,0,0.8);
 color:white;padding:20px;border-radius:10px;
 display:none;
}
</style>
</head>

<body>

<div id="loading">しばらくお待ちください...</div>
<button id="back" onclick="goBack()" style="display:none">←</button>
<div id="app"></div>

<script>
const URL="https://script.google.com/macros/s/AKfycbwoIEq2Bvxc8f1-glqP-0K_SBVdqiATr_Fti0z_Z7vGykZADJKsa3GLlPnbBPQeB-C0NA/exec";

/* ===== 状態 ===== */
let history=[];
let state={
 screen:"home",
 data:[],
 index:0,
 showAnswer:false
};

/* ===== 共通 ===== */
function loading(on){
 document.getElementById("loading").style.display=on?"block":"none";
}

function saveState(){
 history.push(JSON.parse(JSON.stringify(state)));
 document.getElementById("back").style.display="block";
}

function goBack(){
 if(!history.length)return;
 state=history.pop();
 render();
 if(!history.length) document.getElementById("back").style.display="none";
}

/* ===== ホーム ===== */
function renderHome(){
 document.getElementById("back").style.display="none";

 document.getElementById("app").innerHTML=`
  <h2>ホーム</h2>
  <button class="blue" onclick="startReview('normal')">問題復習</button>
  <button class="orange" onclick="startReview('alpha')">α</button>
  <button class="red" onclick="startReview('plus')">＋</button>
  <button class="purple" onclick="startReview('all')">総復習</button>
  <button class="dark" onclick="startReview('continue')">続きから</button>
 `;
}

/* ===== 復習開始 ===== */
async function startReview(mode){
 saveState();
 loading(true);

 let res=await fetch(URL);
 let all=await res.json();

 let today=new Date();

 function diffDays(d){
  return Math.floor((today - new Date(d))/86400000);
 }

 let list=[];

 all.forEach(item=>{
  let d=diffDays(item.date);

  if(mode==="normal") list.push(item);
  if(mode==="alpha" && [3,7,14].includes(d)) list.push(item);
  if(mode==="plus" && [1,3,7,14].includes(d)) list.push(item);
  if(mode==="all") list.push(item);
 });

 if(mode==="continue"){
  let idx=localStorage.getItem("lastIndex")||0;
  state.index=parseInt(idx);
  list=all;
 }

 state.screen="review";
 state.data=list;
 state.index=state.index||0;
 state.showAnswer=false;

 loading(false);
 render();
}

/* ===== 復習画面 ===== */
function renderReview(){
 let item=state.data[state.index];

 if(!item){
  document.getElementById("app").innerHTML=`<h2>データなし</h2>`;
  return;
 }

 document.getElementById("app").innerHTML=`
  <h3>${state.index+1}/${state.data.length}</h3>

  <button class="arrow left" onclick="prev()">←</button>
  <img src="${state.showAnswer ? item.answers[0] : item.questions[0]}">
  <button class="arrow right" onclick="next()">→</button>

  <br>

  <button class="green" onclick="toggleAnswer()">
    ${state.showAnswer?"問題を見る":"答えを見る"}
  </button>
 `;
}

function next(){
 if(state.index < state.data.length-1){
  state.index++;
  state.showAnswer=false;
  localStorage.setItem("lastIndex",state.index);
  render();
 }
}

function prev(){
 if(state.index>0){
  state.index--;
  state.showAnswer=false;
  render();
 }
}

function toggleAnswer(){
 state.showAnswer=!state.showAnswer;
 render();
}

/* ===== ルーター ===== */
function render(){
 if(state.screen==="home") renderHome();
 if(state.screen==="review") renderReview();
}

/* 初期 */
render();
</script>

</body>
</html>
