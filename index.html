<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>完全体</title>

<style>
body { text-align:center; font-family:sans-serif; }
video, canvas, img { width:100%; max-width:400px; }
button { margin:5px; padding:10px; }
#loading {
 position:fixed; top:0; left:0; width:100%; height:100%;
 background:rgba(0,0,0,0.6); color:#fff;
 display:none; align-items:center; justify-content:center;
}
canvas { border:1px solid black; touch-action:none; }
</style>
</head>

<body>

<div id="loading">しばらくお待ちください…</div>

<h2>📚 完全体アプリ</h2>

<button onclick="mode='question'">問題</button>
<button onclick="mode='answer'">答え</button>

<video id="video" autoplay playsinline></video><br>
<button onclick="startCamera()">カメラ</button>
<button onclick="capture()">撮影</button>

<canvas id="canvas"></canvas><br>

<button onclick="add()">追加</button>
<button onclick="send()">送信</button>

<div>問題:<span id="q">0</span> 答え:<span id="a">0</span></div>

<hr>

<button onclick="startReview()">復習開始</button>

<div id="review"></div>

<script>
const URL="https://script.google.com/macros/s/AKfycby8F6D6aj_5xq8nPH-sNjQB4BEtMydS2WWilCkFQ8ngicr4LA4plCpj4o7vQ4PXTIOW/exec";

let video=document.getElementById("video");
let canvas=document.getElementById("canvas");
let ctx=canvas.getContext("2d");

let mode="question";
let qImgs=[];
let aImgs=[];

function loading(v){
 document.getElementById("loading").style.display=v?"flex":"none";
}

async function startCamera(){
 const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}});
 video.srcObject=s;
}

function capture(){
 canvas.width=video.videoWidth;
 canvas.height=video.videoHeight;
 ctx.drawImage(video,0,0);
}

function add(){
 const img=canvas.toDataURL();
 if(mode==="question") qImgs.push(img);
 else aImgs.push(img);
 update();
}

function update(){
 document.getElementById("q").innerText=qImgs.length;
 document.getElementById("a").innerText=aImgs.length;
}

async function send(){
 if(qImgs.length===0||aImgs.length===0)return alert("両方必要");

 loading(true);

 await fetch(URL,{
  method:"POST",
  body:JSON.stringify({
   questions:qImgs,
   answers:aImgs
  })
 });

 qImgs=[]; aImgs=[];
 update();

 loading(false);
 alert("保存完了");
}

let data=[];
let set=0, page=0, mode2="q";

function startReview(){
 loading(true);

 fetch(URL).then(r=>r.json()).then(d=>{
  data=d;
  set=0; page=0; mode2="q";
  loading(false);
  draw();
 });
}

function draw(){
 if(data.length===0)return;

 let s=data[set];
 let imgs=mode2==="q"?s.questions:s.answers;

 document.getElementById("review").innerHTML=`
  <h3>セット${set+1}</h3>
  <img src="${imgs[page]}"><br>
  <button onclick="prev()">←</button>
  <button onclick="next()">→</button><br>
  <button onclick="switchQA()">切替</button><br>
  <button onclick="nextSet()">次の問題</button>
 `;
}

function next(){ page++; draw(); }
function prev(){ if(page>0)page--; draw(); }
function switchQA(){ mode2=mode2==="q"?"a":"q"; page=0; draw(); }
function nextSet(){ set++; page=0; if(set>=data.length)set=0; draw(); }
</script>

</body>
</html>
