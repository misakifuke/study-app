<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{margin:0;font-family:sans-serif;background:#f5f5f5;text-align:center;}
#app{padding-top:70px;}

button{
 width:90%;height:60px;margin:6px;
 border:none;border-radius:12px;
 color:#fff;font-size:15px;
}

.blue{background:#3498db;}
.green{background:#2ecc71;}
.orange{background:#f39c12;}
.red{background:#e74c3c;}
.purple{background:#9b59b6;}
.dark{background:#222;}

#back{
 position:fixed;top:10px;left:10px;
 width:55px;height:55px;
 background:#222;color:#fff;
 z-index:1000;
}

#trashBtn{
 position:fixed;
 bottom:20px;right:20px;
 width:70px;height:70px;
 border-radius:50%;
 background:#444;color:#fff;
 font-size:28px;
 z-index:1000;
}

video,img,canvas{
 width:92%;
 aspect-ratio:16/9;
 object-fit:cover;
 border-radius:12px;
 margin:10px auto;
 display:block;
 background:#000;
}

.wrap{position:relative;overflow:hidden;}
.slide{transition:transform 0.25s ease;}

.arrow{
 position:absolute;top:50%;
 transform:translateY(-50%);
 width:45px;height:45px;
 border-radius:50%;
 background:#222;color:#fff;
}

.left{left:-20px;}
.right{right:-20px;}

.grid{
 display:grid;
 grid-template-columns:1fr 1fr;
 gap:10px;
 padding:10px;
 padding-right:60px;
}

.item img{width:100%;border-radius:10px;}
.selected{outline:4px solid red;}

#topBar{
 position:fixed;top:0;left:0;width:100%;
 height:60px;background:#222;color:#fff;
 display:none;align-items:center;
 justify-content:space-between;padding:0 10px;
 z-index:1000;
}

#loading{
 position:fixed;top:0;left:0;width:100%;height:100%;
 background:rgba(0,0,0,0.6);
 color:#fff;display:none;
 align-items:center;justify-content:center;
 font-size:20px;z-index:999;
}
</style>
</head>

<body>

<div id="loading">しばらくお待ちください...</div>

<div id="topBar">
 <div onclick="goHome()">←</div>
 <div onclick="deleteSelected()">まとめて削除</div>
</div>

<button id="back">←</button>
<button id="trashBtn" onclick="openTrash()">🗑</button>

<div id="app"></div>

<script>
const app=document.getElementById("app");
const back=document.getElementById("back");
const topBar=document.getElementById("topBar");
const loading=document.getElementById("loading");

const URL="https://script.google.com/macros/s/AKfycbwoIEq2Bvxc8f1-glqP-0K_SBVdqiATr_Fti0z_Z7vGykZADJKsa3GLlPnbBPQeB-C0NA/exec";

let history=[];
let cachedData=null;
let video,canvas,ctx;

/* スワイプ */
let startX=0,endX=0;

let state={
 screen:"home",
 reviewMode:"",
 qImgs:[],aImgs:[],tempImgs:[],
 isAnswer:false,
 editIndex:0,
 reviewData:[],
 reviewIndex:0,
 reviewSub:0,
 mode:"q",
 trashData:[],
 selected:[]
};

function showLoading(){loading.style.display="flex";}
function hideLoading(){loading.style.display="none";}
function save(){history.push(JSON.stringify(state));}

back.onclick=()=>{
 if(history.length){
  state=JSON.parse(history.pop());
  render();
 }
};

function render(){
 back.style.display=(state.screen==="home"||state.screen==="trash")?"none":"block";
 topBar.style.display=(state.screen==="trash")?"flex":"none";

 if(state.screen==="home") home();
 if(state.screen==="cam") cam();
 if(state.screen==="edit") edit();
 if(state.screen==="review") review();
 if(state.screen==="trash") trash();
}

/* ホーム */
function home(){
 app.innerHTML=`
 <h2>ホーム</h2>
 <button class="blue" onclick="goCam()">問題登録</button>
 <button class="green" onclick="startReview('normal')">問題復習</button>
 <button class="orange" onclick="startReview('alpha')">問題復習α</button>
 <button class="red" onclick="startReview('plus')">問題復習＋</button>
 <button class="purple" onclick="startReview('all')">総復習</button>
 <button class="dark" onclick="startContinue()">続きから総復習</button>
 `;
}

/* カメラ */
function goCam(){save();state.screen="cam";render();}

async function cam(){
 app.innerHTML=`
 <video id="video" autoplay playsinline></video>
 <img id="prev" style="display:none">
 <button class="captureBtn" onclick="capture()"></button>
 <div id="btns"></div>
 ${!state.isAnswer?'<button class="green" onclick="goEdit()">編集</button>':''}
 ${state.isAnswer?'<button class="red" onclick="send()">送信</button>':''}
 `;
 video=document.getElementById("video");
 let s=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}});
 video.srcObject=s;
}

function crop169(w,h){
 let r=16/9,cur=w/h;
 if(cur>r){
  let nw=h*r;
  return {sx:(w-nw)/2,sy:0,sw:nw,sh:h};
 }else{
  let nh=w/r;
  return {sx:0,sy:(h-nh)/2,sw:w,sh:nh};
 }
}

function capture(){
 let c=document.createElement("canvas");
 let cx=c.getContext("2d");
 let w=video.videoWidth,h=video.videoHeight;
 let crop=crop169(w,h);

 c.width=1280;c.height=720;
 cx.drawImage(video,crop.sx,crop.sy,crop.sw,crop.sh,0,0,1280,720);

 let data=c.toDataURL("image/jpeg",0.6);

 video.style.display="none";
 let prev=document.getElementById("prev");
 prev.src=data; prev.style.display="block";

 document.getElementById("btns").innerHTML=`
 <button class="blue" onclick="add('${data}')">追加</button>
 <button class="orange" onclick="retake()">撮り直し</button>
 `;
}

function add(d){
 state.tempImgs.push(d);
 video.style.display="block";
 document.getElementById("prev").style.display="none";
 document.getElementById("btns").innerHTML="";
}

function retake(){
 video.style.display="block";
 document.getElementById("prev").style.display="none";
 document.getElementById("btns").innerHTML="";
}

/* 編集 */
function goEdit(){
 if(!state.tempImgs.length)return alert("画像なし");
 save();
 state.screen="edit";
 state.editIndex=0;
 render();
}

let drawing=false;

function edit(){
 app.innerHTML=`
 <div class="wrap">
 <button class="arrow left" onclick="prevImg()">←</button>
 <canvas id="canvas"></canvas>
 <button class="arrow right" onclick="nextImg()">→</button>
 </div>
 <button class="green" onclick="finishEdit()">完了</button>
 `;
 canvas=document.getElementById("canvas");
 ctx=canvas.getContext("2d");

 canvas.addEventListener("touchstart",e=>{drawing=true;draw(e)},{passive:false});
 canvas.addEventListener("touchmove",e=>{if(drawing)draw(e)},{passive:false});
 canvas.addEventListener("touchend",()=>drawing=false);

 show();
}

function show(){
 let img=new Image();
 img.src=state.tempImgs[state.editIndex];
 img.onload=()=>{
  canvas.width=img.width;
  canvas.height=img.height;
  ctx.drawImage(img,0,0);
 };
}

function draw(e){
 e.preventDefault();
 let r=canvas.getBoundingClientRect();
 let x=(e.touches[0].clientX-r.left)*(canvas.width/r.width);
 let y=(e.touches[0].clientY-r.top)*(canvas.height/r.height);
 ctx.fillStyle="red";
 ctx.fillRect(x,y,5,5);
}

function nextImg(){saveEdit();if(state.editIndex<state.tempImgs.length-1)state.editIndex++;show();}
function prevImg(){saveEdit();if(state.editIndex>0)state.editIndex--;show();}
function saveEdit(){state.tempImgs[state.editIndex]=canvas.toDataURL();}

function finishEdit(){
 saveEdit();
 state.qImgs=state.qImgs.concat(state.tempImgs);
 state.tempImgs=[];
 state.isAnswer=true;
 state.screen="cam";
 render();
}

/* 送信 */
async function send(){
 try{
  showLoading();
  await fetch(URL,{
   method:"POST",
   body:JSON.stringify({questions:state.qImgs,answers:state.aImgs})
  });
 }catch(e){alert("送信失敗");}
 hideLoading();

 state={screen:"home",reviewMode:"",qImgs:[],aImgs:[],tempImgs:[],isAnswer:false};
 history=[];
 render();
}

/* データ取得 */
async function fetchData(){
 if(cachedData) return cachedData;

 let saved=localStorage.getItem("cache");
 if(saved){
  cachedData=JSON.parse(saved);
  return cachedData;
 }

 let res=await fetch(URL);
 let data=await res.json();

 cachedData=data;
 localStorage.setItem("cache",JSON.stringify(data));

 return data;
}

/* 復習 */
async function startReview(mode){
 save();
 state.reviewMode=mode;

 showLoading();
 let data=await fetchData();

 state.reviewData=data;
 state.reviewIndex=0;
 state.reviewSub=0;
 state.mode="q";
 state.screen="review";

 hideLoading();
 render();
}

/* レビュー */
function review(){
 let d=state.reviewData[state.reviewIndex];
 if(!d)return app.innerHTML="データなし";

 let list=state.mode==="q"?d.questions:d.answers;

 app.innerHTML=`
 <div>(${state.reviewIndex+1}/${state.reviewData.length})</div>
 <div class="wrap" id="swipeArea">
 <img id="slideImg" class="slide" src="${list[state.reviewSub]}">
 </div>
 <button class="green" onclick="toggle()">切替</button>
 `;

 let area=document.getElementById("swipeArea");

 area.addEventListener("touchstart",e=>{
  startX=e.touches[0].clientX;
 });

 area.addEventListener("touchend",e=>{
  endX=e.changedTouches[0].clientX;
  handleSwipe();
 });
}

function handleSwipe(){
 let diff=endX-startX;
 if(Math.abs(diff)<50) return;

 let img=document.getElementById("slideImg");

 if(diff<0){
  img.style.transform="translateX(-100%)";
  setTimeout(()=>{nextR();},200);
 }else{
  img.style.transform="translateX(100%)";
  setTimeout(()=>{prevR();},200);
 }
}

function nextR(){state.reviewSub++;render();}
function prevR(){state.reviewSub--;render();}
function toggle(){state.mode=state.mode==="q"?"a":"q";render();}

/* 🗑 ゴミ箱 */
async function openTrash(){
 state.screen="trash";
 state.selected=[];
 let data=await fetchData();
 state.trashData=data;
 render();
}

function trash(){
 let html='<div class="grid">';
 state.trashData.forEach((d,i)=>{
  let sel=state.selected.includes(i)?"selected":"";
  html+=`
   <div class="item ${sel}" onclick="toggleSelect(${i})">
    <img src="${d.questions[0]}">
   </div>
  `;
 });
 html+='</div>';
 app.innerHTML=html;
}

function toggleSelect(i){
 if(state.selected.includes(i)){
  state.selected=state.selected.filter(x=>x!==i);
 }else{
  state.selected.push(i);
 }
 render();
}

async function deleteSelected(){
 if(!state.selected.length)return alert("選択なし");

 await fetch(URL,{
  method:"POST",
  body:JSON.stringify({deleteList:state.selected})
 });

 state.trashData=state.trashData.filter((_,i)=>!state.selected.includes(i));
 state.selected=[];
 render();
}

function goHome(){
 state.screen="home";
 render();
}

render();
</script>
</body>
</html>
