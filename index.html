<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{margin:0;font-family:sans-serif;text-align:center;background:#f5f5f5;}
button{width:85%;height:65px;margin:10px;border:none;border-radius:12px;color:white;font-size:18px;}
.blue{background:#3498db;}
.green{background:#2ecc71;}
.orange{background:#f39c12;}
.red{background:#e74c3c;}
.purple{background:#9b59b6;}
.dark{background:#222;}
#back{position:fixed;top:10px;left:10px;width:50px;height:50px;background:#222;color:white;}
video{width:90%;height:55vh;object-fit:cover;border-radius:10px;}
canvas{width:90%;max-height:55vh;border:1px solid black;border-radius:10px;}
img{width:90%;max-height:60vh;}
.captureBtn{
 position:fixed;bottom:20px;left:20px;width:70px;height:70px;
 border-radius:50%;background:white;border:5px solid #ccc;
}
.arrow{
 position:absolute;top:50%;transform:translateY(-50%);
 width:50px;height:50px;border-radius:50%;
 background:#222;color:white;
}
.left{left:-60px;}
.right{right:-60px;}
.wrap{position:relative;display:inline-block;}
#flash,#loading{
 position:fixed;top:50%;left:50%;
 transform:translate(-50%,-50%);
 background:rgba(0,0,0,0.8);
 color:white;padding:20px;border-radius:10px;
 display:none;
}
</style>
</head>

<body>

<div id="flash"></div>
<div id="loading">しばらくお待ちください...</div>
<button id="back" onclick="goBack()" style="display:none">←</button>
<div id="app"></div>

<script>
const URL="https://script.google.com/macros/s/AKfycbwoIEq2Bvxc8f1-glqP-0K_SBVdqiATr_Fti0z_Z7vGykZADJKsa3GLlPnbBPQeB-C0NA/exec";

/* ===== 状態 ===== */
let history=[];
let state={
 screen:"home",
 qImgs:[], aImgs:[], tempImgs:[],
 isAnswer:false, editIndex:0,
 reviewData:[],
 reviewIndex:0,
 reviewSubIndex:0,
 modeQA:"q"
};

let video,canvas,ctx;

/* ===== 共通 ===== */
function flash(t){
 let f=document.getElementById("flash");
 f.innerText=t;
 f.style.display="block";
 setTimeout(()=>f.style.display="none",500);
}
function loading(on){
 document.getElementById("loading").style.display=on?"block":"none";
}
function save(){
 history.push(JSON.parse(JSON.stringify(state)));
 document.getElementById("back").style.display="block";
}
function goBack(){
 if(!history.length)return;
 state=history.pop();
 render();
 if(!history.length) document.getElementById("back").style.display="none";
}

/* ===== ルーター ===== */
function render(){
 if(state.screen==="home") home();
 if(state.screen==="register") register();
 if(state.screen==="edit") edit();
 if(state.screen==="review") review();
}

/* ===== ホーム ===== */
function home(){
 document.getElementById("back").style.display="none";
 document.getElementById("app").innerHTML=`
  <h2>ホーム</h2>
  <button class="blue" onclick="goRegister()">問題登録</button>
  <button class="green" onclick="startReview('normal')">問題復習</button>
  <button class="orange" onclick="startReview('alpha')">α</button>
  <button class="red" onclick="startReview('plus')">＋</button>
  <button class="purple" onclick="startReview('all')">総復習</button>
  <button class="dark" onclick="startReview('continue')">続きから</button>
 `;
}

/* ===== 登録 ===== */
function goRegister(){save();state.screen="register";render();}

function register(){
 document.getElementById("app").innerHTML=`
  <h2>${state.isAnswer?"答え撮影":"問題撮影"}</h2>
  <video id="video" autoplay playsinline muted></video>
  <button class="captureBtn" onclick="capture()"></button>
  <canvas id="canvas"></canvas>
  <button class="blue" onclick="add()">追加</button>
  ${state.isAnswer
    ? `<button class="red" onclick="send()">送信</button>`
    : `<button class="green" onclick="goEdit()">編集</button>`
  }
  <div id="count"></div>
 `;

 video=document.getElementById("video");
 canvas=document.getElementById("canvas");
 ctx=canvas.getContext("2d");

 updateCount();
 startCamera();
}

async function startCamera(){
 const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}});
 video.srcObject=s;
}

function capture(){
 canvas.width=video.videoWidth;
 canvas.height=video.videoHeight;
 ctx.drawImage(video,0,0);
}

function add(){
 if(canvas.width===0)return alert("先に撮影");
 state.tempImgs.push(canvas.toDataURL());
 updateCount();
 flash("追加完了");
}

function updateCount(){
 document.getElementById("count").innerText=
  `問題:${state.qImgs.length + (!state.isAnswer?state.tempImgs.length:0)} / 答え:${state.aImgs.length + (state.isAnswer?state.tempImgs.length:0)}`;
}

/* ===== 編集 ===== */
function goEdit(){
 if(state.tempImgs.length===0)return alert("画像なし");
 save();
 state.screen="edit";
 state.editIndex=0;
 render();
}

let drawing=false;

function edit(){
 document.getElementById("app").innerHTML=`
  <h2>編集</h2>
  <div class="wrap">
    <button class="arrow left" onclick="prev()">←</button>
    <img id="img">
    <button class="arrow right" onclick="next()">→</button>
  </div>
  <canvas id="canvas"></canvas>
  <button class="green" onclick="finishEdit()">完了</button>
 `;

 canvas=document.getElementById("canvas");
 ctx=canvas.getContext("2d");

 canvas.addEventListener("touchstart",startDraw,{passive:false});
 canvas.addEventListener("touchmove",moveDraw,{passive:false});
 canvas.addEventListener("touchend",()=>drawing=false);

 show();
}

function startDraw(e){drawing=true;draw(e);}
function moveDraw(e){if(drawing)draw(e);}
function draw(e){
 e.preventDefault();
 const rect=canvas.getBoundingClientRect();
 const x=(e.touches[0].clientX-rect.left)*(canvas.width/rect.width);
 const y=(e.touches[0].clientY-rect.top)*(canvas.height/rect.height);
 ctx.fillStyle="red";
 ctx.fillRect(x,y,5,5);
}

function show(){
 let img=new Image();
 img.src=state.tempImgs[state.editIndex];
 img.onload=()=>{
  canvas.width=img.width;
  canvas.height=img.height;
  ctx.drawImage(img,0,0);
 };
}

function next(){saveEdit();if(state.editIndex<state.tempImgs.length-1)state.editIndex++;show();}
function prev(){saveEdit();if(state.editIndex>0)state.editIndex--;show();}
function saveEdit(){state.tempImgs[state.editIndex]=canvas.toDataURL();}

function finishEdit(){
 saveEdit();
 state.qImgs=state.qImgs.concat(state.tempImgs);
 state.tempImgs=[];
 state.isAnswer=true;
 state.screen="register";
 render();
}

/* ===== 送信 ===== */
async function send(){
 state.aImgs=state.aImgs.concat(state.tempImgs);
 state.tempImgs=[];
 loading(true);

 await fetch(URL,{
  method:"POST",
  body:JSON.stringify({
   questions:state.qImgs,
   answers:state.aImgs
  })
 });

 loading(false);

 state={screen:"home",qImgs:[],aImgs:[],tempImgs:[],isAnswer:false,editIndex:0,reviewData:[],reviewIndex:0,reviewSubIndex:0,modeQA:"q"};
 history=[];
 render();
}

/* ===== 復習（完全修正） ===== */
async function startReview(mode){
 save();
 loading(true);

 let res=await fetch(URL);
 let all=await res.json();

 function diff(d){
  let t=new Date();
  let a=new Date(d);

  // 🔥時間を消す（最重要）
  t.setHours(0,0,0,0);
  a.setHours(0,0,0,0);

  return Math.floor((t-a)/86400000);
 }

 let list=[];
 all.forEach(x=>{
  let d=diff(x.date);

  if(mode==="normal" && d===1) list.push(x);
  if(mode==="alpha" && [3,7,14].includes(d)) list.push(x);
  if(mode==="plus" && [1,3,7,14].includes(d)) list.push(x);
  if(mode==="all") list.push(x);
 });

 if(mode==="continue"){
  let idx=localStorage.getItem("last")||0;
  state.reviewIndex=parseInt(idx);
  list=all;
 }

 state.reviewData=list;
 state.reviewIndex=0;
 state.reviewSubIndex=0;
 state.modeQA="q";
 state.screen="review";

 loading(false);
 render();
}

function review(){
 let d=state.reviewData[state.reviewIndex];
 if(!d)return document.getElementById("app").innerHTML="データなし";

 let list = state.modeQA==="q" ? d.questions : d.answers;

 document.getElementById("app").innerHTML=`
  <h3>${state.reviewIndex+1}/${state.reviewData.length}</h3>
  <h4>${state.modeQA==="q"?"問題":"答え"} ${state.reviewSubIndex+1}/${list.length}</h4>

  <div class="wrap">
    <button class="arrow left" onclick="prevImg()">←</button>
    <img src="${list[state.reviewSubIndex]}">
    <button class="arrow right" onclick="nextImg()">→</button>
  </div>

  <br>

  <button class="green" onclick="toggleQA()">
    ${state.modeQA==="q"?"答えへ":"問題へ"}
  </button>
 `;
}

function nextImg(){
 let d=state.reviewData[state.reviewIndex];
 let list = state.modeQA==="q"?d.questions:d.answers;

 if(state.reviewSubIndex < list.length-1){
  state.reviewSubIndex++;
 }else{
  if(state.reviewIndex < state.reviewData.length-1){
    state.reviewIndex++;
    state.reviewSubIndex=0;
    state.modeQA="q";
    localStorage.setItem("last",state.reviewIndex);
  }
 }
 render();
}

function prevImg(){
 if(state.reviewSubIndex>0){
  state.reviewSubIndex--;
 }else{
  if(state.reviewIndex>0){
    state.reviewIndex--;
    state.reviewSubIndex=0;
    state.modeQA="q";
  }
 }
 render();
}

function toggleQA(){
 state.modeQA = state.modeQA==="q" ? "a" : "q";
 state.reviewSubIndex=0;
 render();
}

/* 初期 */
render();
</script>
</body>
</html>
