<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>問題登録</title>

<style>
body {
  text-align: center;
  font-family: sans-serif;
}

#container {
  position: relative;
  display: inline-block;
  width: 100%;
  max-width: 400px;
}

video, canvas {
  width: 100%;
  display: block;
}

canvas {
  position: absolute;
  top: 0;
  left: 0;
}

button {
  margin: 8px;
  padding: 10px;
}
</style>
</head>

<body>

<h2>問題登録</h2>

<div id="container">
  <video id="video" autoplay playsinline></video>
  <canvas id="canvas"></canvas>
</div>

<br>

<button onclick="startCamera()">カメラ開始</button>
<button onclick="capture()">撮影</button>
<button onclick="clearCanvas()">リセット</button>
<button onclick="send()">送信</button>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbziof54Gsx2-44mVD5Rh3ubSaaSTvSSiV1AohWkMVhbgEJb5yHw41Z4qCCXZ1bTV2L7/exec";

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let images = [];
let drawing = false;

/* ===== カメラ（外カメ固定） ===== */
async function startCamera() {
  const stream = await navigator.mediaDevices.getUserMedia({
    video: {
      facingMode: { exact: "environment" } // ←外カメ強制
    }
  });
  video.srcObject = stream;

  video.onloadedmetadata = () => {
    resizeCanvas();
  };
}

/* ===== サイズ完全一致（これがズレ対策の本体） ===== */
function resizeCanvas() {
  const rect = video.getBoundingClientRect();
  canvas.width = rect.width;
  canvas.height = rect.height;
}

/* ===== 撮影 ===== */
function capture() {
  resizeCanvas();

  ctx.clearRect(0, 0, canvas.width, canvas.height); // ←前回消す
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

  ctx.beginPath(); // ←バグ防止

  const data = canvas.toDataURL("image/png");
  images.push(data);
}

/* ===== リセット ===== */
function clearCanvas() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.beginPath();
}

/* ===== 送信 ===== */
async function send() {
  if (images.length === 0) {
    alert("画像ない");
    return;
  }

  await fetch(GAS_URL, {
    method: "POST",
    body: JSON.stringify({ images })
  });

  alert("送信完了");
  images = [];
}

/* ===== 描画（ズレ完全修正） ===== */
canvas.addEventListener("touchstart", (e) => {
  drawing = true;
  ctx.beginPath();
  draw(e);
});

canvas.addEventListener("touchend", () => drawing = false);
canvas.addEventListener("touchmove", draw);

function draw(e) {
  if (!drawing) return;

  const rect = canvas.getBoundingClientRect();

  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;

  const x = (e.touches[0].clientX - rect.left) * scaleX;
  const y = (e.touches[0].clientY - rect.top) * scaleY;

  ctx.lineWidth = 3;
  ctx.lineCap = "round";

  ctx.lineTo(x, y);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(x, y);

  e.preventDefault();
}
</script>

</body>
</html>
