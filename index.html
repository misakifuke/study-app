<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>問題登録</title>

<style>
body {
  text-align: center;
  font-family: sans-serif;
}

#container {
  position: relative;
  display: inline-block;
}

video, canvas {
  width: 100%;
  max-width: 400px;
  display: block;
}

canvas {
  position: absolute;
  top: 0;
  left: 0;
}

button {
  margin: 10px;
  padding: 10px 20px;
  font-size: 16px;
}
</style>
</head>

<body>

<h1>問題登録</h1>

<div id="container">
  <video id="video" autoplay playsinline></video>
  <canvas id="canvas"></canvas>
</div>

<br>

<button onclick="startCamera()">撮影開始</button>
<button onclick="capture()">撮影</button>
<button onclick="save()">保存</button>

<br><br>

<button onclick="setMode('question')">問題</button>
<button onclick="setMode('answer')">答え</button>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycby8F6D6aj_5xq8nPH-sNjQB4BEtMydS2WWilCkFQ8ngicr4LA4plCpj4o7vQ4PXTIOW/exec";

let video = document.getElementById("video");
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");

let stream;
let drawing = false;
let mode = "question";

function setMode(m){
  mode = m;
  alert("モード：" + m);
}

async function startCamera() {
  stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: "environment" },
    audio: false
  });
  video.srcObject = stream;

  video.onloadedmetadata = () => {
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
  };
}

function capture() {
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
}

function save() {
  let image = canvas.toDataURL("image/png");

  fetch(GAS_URL, {
    method: "POST",
    body: JSON.stringify({
      image: image,
      mode: mode
    })
  })
  .then(res => res.text())
  .then(data => {
    alert("保存成功！");
    ctx.clearRect(0, 0, canvas.width, canvas.height);
  });
}

canvas.addEventListener("mousedown", () => drawing = true);
canvas.addEventListener("mouseup", () => {
  drawing = false;
  ctx.beginPath();
});
canvas.addEventListener("mousemove", draw);

canvas.addEventListener("touchstart", () => drawing = true);
canvas.addEventListener("touchend", () => {
  drawing = false;
  ctx.beginPath();
});
canvas.addEventListener("touchmove", draw);

function draw(e) {
  if (!drawing) return;

  let rect = canvas.getBoundingClientRect();
  let x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
  let y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;

  x *= canvas.width / rect.width;
  y *= canvas.height / rect.height;

  ctx.lineWidth = 4;
  ctx.lineCap = "round";

  ctx.lineTo(x, y);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x, y);
}
</script>

</body>
</html>
