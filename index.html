<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{margin:0;font-family:sans-serif;text-align:center;background:#f5f5f5;}

/* ボタン */
button{
 width:90%;
 height:70px;
 margin:10px;
 border:none;
 border-radius:14px;
 color:white;
 font-size:18px;
}
.blue{background:#3498db;}
.green{background:#2ecc71;}
.orange{background:#f39c12;}
.red{background:#e74c3c;}
.purple{background:#9b59b6;}
.dark{background:#222;}

/* 戻る */
#back{
 position:fixed;
 top:10px;left:10px;
 width:55px;height:55px;
 background:#222;color:white;
}

/* 🔥 カメラ＆画像（横16:9固定＆中央） */
video,img,canvas{
 width:92%;
 aspect-ratio:16/9;
 object-fit:cover;
 border-radius:12px;
 display:block;
 margin:10px auto;
}

/* 撮影ボタン */
.captureBtn{
 position:fixed;
 bottom:20px;left:50%;
 transform:translateX(-50%);
 width:75px;height:75px;
 border-radius:50%;
 background:white;
 border:5px solid #ccc;
}

/* 矢印 */
.wrap{position:relative;display:inline-block;}
.arrow{
 position:absolute;
 top:50%;
 transform:translateY(-50%);
 width:55px;height:55px;
 border-radius:50%;
 background:#222;color:white;
}
.left{left:-50px;}
.right{right:-50px;}

/* 表示 */
#flash,#loading{
 position:fixed;
 top:50%;left:50%;
 transform:translate(-50%,-50%);
 background:rgba(0,0,0,0.85);
 color:white;
 padding:20px;
 border-radius:10px;
 display:none;
}
</style>
</head>

<body>

<div id="flash"></div>
<div id="loading">しばらくお待ちください...</div>
<button id="back" onclick="goBack()" style="display:none">←</button>
<div id="app"></div>

<script>
const URL="https://script.google.com/macros/s/AKfycbwoIEq2Bvxc8f1-glqP-0K_SBVdqiATr_Fti0z_Z7vGykZADJKsa3GLlPnbBPQeB-C0NA/exec";

let history=[];
let currentMode="normal";
let captured=null;

let state={
 screen:"home",
 qImgs:[],aImgs:[],tempImgs:[],
 isAnswer:false,editIndex:0,
 reviewData:[],
 reviewIndex:0,
 reviewSubIndex:0,
 modeQA:"q"
};

let video,canvas,ctx;

/* 共通 */
function flash(t){
 let f=document.getElementById("flash");
 f.innerText=t;
 f.style.display="block";
 setTimeout(()=>f.style.display="none",500);
}
function loading(on){
 document.getElementById("loading").style.display=on?"block":"none";
}
function save(){
 history.push(JSON.parse(JSON.stringify(state)));
 document.getElementById("back").style.display="block";
}
function goBack(){
 if(!history.length)return;
 state=history.pop();
 render();
 if(!history.length) document.getElementById("back").style.display="none";
}

/* 画面 */
function render(){
 if(state.screen==="home") home();
 if(state.screen==="register") register();
 if(state.screen==="edit") edit();
 if(state.screen==="review") review();
}

/* ホーム */
function home(){
 document.getElementById("back").style.display="none";
 document.getElementById("app").innerHTML=`
  <h2>ホーム</h2>
  <button class="blue" onclick="goRegister()">問題登録</button>
  <button class="green" onclick="startReview('normal')">問題復習</button>
  <button class="orange" onclick="startReview('alpha')">α</button>
  <button class="red" onclick="startReview('plus')">＋</button>
  <button class="purple" onclick="startReview('all')">総復習</button>
  <button class="dark" onclick="startReview('continue')">続きから</button>
 `;
}

/* 登録 */
function goRegister(){save();state.screen="register";render();}

function register(){
 document.getElementById("app").innerHTML=`
  <h2>${state.isAnswer?"答え撮影":"問題撮影"}</h2>

  <video id="video" autoplay playsinline muted></video>
  <img id="preview" style="display:none">

  <button class="captureBtn" onclick="capture()"></button>

  <!-- 🔥 常時編集ボタン -->
  ${!state.isAnswer ? `<button class="green" onclick="goEdit()">編集</button>` : ""}

  <div id="controls"></div>
  <div id="count"></div>
 `;

 video=document.getElementById("video");
 startCamera();
 updateCount();
}

async function startCamera(){
 const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}});
 video.srcObject=s;
}

function capture(){
 let c=document.createElement("canvas");
 c.width=video.videoWidth;
 c.height=video.videoHeight;
 c.getContext("2d").drawImage(video,0,0);

 captured=c.toDataURL();

 video.style.display="none";
 let img=document.getElementById("preview");
 img.src=captured;
 img.style.display="block";

 document.getElementById("controls").innerHTML=`
  <button class="blue" onclick="addOne()">追加</button>
  <button class="orange" onclick="retake()">撮り直し</button>
  ${state.isAnswer ? `<button class="red" onclick="send()">送信</button>` : ""}
 `;
}

function addOne(){
 state.tempImgs.push(captured);
 flash("追加完了");

 captured=null;
 document.getElementById("preview").style.display="none";
 video.style.display="block";
 document.getElementById("controls").innerHTML="";

 updateCount();
}

function retake(){
 captured=null;
 document.getElementById("preview").style.display="none";
 video.style.display="block";
 document.getElementById("controls").innerHTML="";
}

function updateCount(){
 let q=state.qImgs.length + (!state.isAnswer?state.tempImgs.length:0);
 let a=state.aImgs.length + (state.isAnswer?state.tempImgs.length:0);
 document.getElementById("count").innerText=`問題:${q} / 答え:${a}`;
}

/* 編集 */
function goEdit(){
 if(state.tempImgs.length===0)return alert("画像なし");
 save();
 state.screen="edit";
 state.editIndex=0;
 render();
}

let drawing=false;

function edit(){
 document.getElementById("app").innerHTML=`
  <h2>編集</h2>
  <div class="wrap">
    <button class="arrow left" onclick="prev()">←</button>
    <canvas id="canvas"></canvas>
    <button class="arrow right" onclick="next()">→</button>
  </div>
  <button class="green" onclick="finishEdit()">完了</button>
 `;

 canvas=document.getElementById("canvas");
 ctx=canvas.getContext("2d");

 canvas.addEventListener("touchstart",e=>{drawing=true;draw(e)},{passive:false});
 canvas.addEventListener("touchmove",e=>{if(drawing)draw(e)},{passive:false});
 canvas.addEventListener("touchend",()=>drawing=false);

 show();
}

function draw(e){
 e.preventDefault();
 let r=canvas.getBoundingClientRect();
 let x=(e.touches[0].clientX-r.left)*(canvas.width/r.width);
 let y=(e.touches[0].clientY-r.top)*(canvas.height/r.height);
 ctx.fillStyle="red";
 ctx.fillRect(x,y,5,5);
}

function show(){
 let img=new Image();
 img.src=state.tempImgs[state.editIndex];
 img.onload=()=>{
  canvas.width=img.width;
  canvas.height=img.height;
  ctx.drawImage(img,0,0);
 };
}

function next(){saveEdit();if(state.editIndex<state.tempImgs.length-1)state.editIndex++;show();}
function prev(){saveEdit();if(state.editIndex>0)state.editIndex--;show();}
function saveEdit(){state.tempImgs[state.editIndex]=canvas.toDataURL();}

function finishEdit(){
 saveEdit();
 state.qImgs=state.qImgs.concat(state.tempImgs);
 state.tempImgs=[];
 state.isAnswer=true;
 state.screen="register";
 render();
}

/* 送信 */
async function send(){
 state.aImgs=state.aImgs.concat(state.tempImgs);
 state.tempImgs=[];
 loading(true);

 await fetch(URL,{
  method:"POST",
  body:JSON.stringify({
   questions:state.qImgs,
   answers:state.aImgs
  })
 });

 loading(false);

 state={screen:"home",qImgs:[],aImgs:[],tempImgs:[],isAnswer:false,editIndex:0,reviewData:[],reviewIndex:0,reviewSubIndex:0,modeQA:"q"};
 history=[];
 render();
}

/* 復習（省略なしそのまま） */
async function startReview(mode){
 save();
 loading(true);
 currentMode=mode;

 let res=await fetch(URL);
 let all=await res.json();

 function diff(d){
  let t=new Date(),a=new Date(d);
  t.setHours(0,0,0,0);
  a.setHours(0,0,0,0);
  return Math.floor((t-a)/86400000);
 }

 let list=[];
 all.forEach(x=>{
  let d=diff(x.date);
  if(mode==="normal" && d===1) list.push(x);
  if(mode==="alpha" && [3,7,14].includes(d)) list.push(x);
  if(mode==="plus" && [1,3,7,14].includes(d)) list.push(x);
  if(mode==="all") list.push(x);
 });

 state.reviewData=list;
 state.reviewIndex=0;
 state.reviewSubIndex=0;
 state.modeQA="q";
 state.screen="review";

 loading(false);
 render();
}

function review(){
 let d=state.reviewData[state.reviewIndex];
 if(!d)return document.getElementById("app").innerHTML="データなし";

 let list=state.modeQA==="q"?d.questions:d.answers;

 document.getElementById("app").innerHTML=`
  <h3>${state.reviewIndex+1}/${state.reviewData.length}</h3>
  <h4>${state.modeQA==="q"?"問題":"答え"} ${state.reviewSubIndex+1}/${list.length}</h4>

  <div class="wrap">
    <button class="arrow left" onclick="prevImg()">←</button>
    <img src="${list[state.reviewSubIndex]}">
    <button class="arrow right" onclick="nextImg()">→</button>
  </div>

  <button class="green" onclick="toggleQA()">切替</button>
 `;
}

function nextImg(){
 let d=state.reviewData[state.reviewIndex];
 let list=state.modeQA==="q"?d.questions:d.answers;

 if(state.reviewSubIndex<list.length-1){
  state.reviewSubIndex++;
 }else{
  if(state.reviewIndex<state.reviewData.length-1){
   state.reviewIndex++;
   state.reviewSubIndex=0;
   state.modeQA="q";
  }
 }
 render();
}

function prevImg(){
 if(state.reviewSubIndex>0){
  state.reviewSubIndex--;
 }else if(state.reviewIndex>0){
  state.reviewIndex--;
  state.reviewSubIndex=0;
  state.modeQA="q";
 }
 render();
}

function toggleQA(){
 state.modeQA=state.modeQA==="q"?"a":"q";
 state.reviewSubIndex=0;
 render();
}

render();
</script>
</body>
</html>
